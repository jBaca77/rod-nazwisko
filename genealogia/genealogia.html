<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genealogia | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f8f4ee; --parchment: #ede8df; --warm-white: #fdfaf6;
            --ink: #1e1a14; --ink-light: #3d3628; --sepia: #7a6548;
            --sepia-light: #b09a7e; --sepia-pale: #e8ddd0; --gold: #9b7d4a;
            --gold-light: #c8a96e; --green-dark: #2c3e2d; --line: rgba(122, 101, 72, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Jost', sans-serif; font-weight: 300; background-color: var(--warm-white); color: var(--ink); line-height: 1.7; overflow-x: hidden; }

        /* ── HEADER ── */
        header { background-color: var(--green-dark); color: var(--cream); text-align: center; padding: 100px 24px 80px; position: relative; overflow: hidden; }
        header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,.025) 40px, rgba(255,255,255,.025) 41px), repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,.025) 40px, rgba(255,255,255,.025) 41px); pointer-events: none; }
        .header-ornament { font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: .35em; text-transform: uppercase; color: var(--gold-light); margin-bottom: 20px; display: block; }
        header h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(2.6rem, 6vw, 4.8rem); line-height: 1.1; }

        /* ── NAV ── */
        nav { background-color: var(--ink); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 20px rgba(0,0,0,.3); }
        .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; }
        .nav-logo { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); text-decoration: none; font-size: 1.2rem; letter-spacing: 2px; }
        .menu-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
        .menu-btn span { display: block; width: 28px; height: 1.5px; background: var(--gold-light); transition: 0.3s; }

        /* ── GRID SEKCJII ── */
        main { max-width: 1100px; margin: 0 auto; padding: 80px 24px; }
        .s-label { font-size: .65rem; letter-spacing: .3em; text-transform: uppercase; color: var(--sepia-light); margin-bottom: 10px; display: block; text-align: center; }
        .s-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); margin-bottom: 40px; color: var(--ink); text-align: center; }
        
        .gen-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 30px; 
            margin-top: 20px;
        }

        .gen-card { 
            background: var(--cream); 
            border: 1px solid var(--sepia-pale); 
            padding: 40px 30px; 
            text-align: center; 
            text-decoration: none; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 220px;
        }

        .gen-card::after {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px solid var(--line);
            pointer-events: none;
            transition: 0.4s;
        }

        .gen-card:hover { 
            transform: translateY(-5px); 
            background-color: var(--parchment);
            border-color: var(--gold);
        }

        .gen-card:hover::after {
            border-color: var(--gold-light);
            inset: 15px;
        }

        .gen-card h3 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 1.6rem; 
            color: var(--ink); 
            font-weight: 400;
            margin-bottom: 10px;
            z-index: 1;
        }

        .gen-card .card-ornament {
            width: 30px;
            height: 1px;
            background: var(--gold);
            margin-bottom: 15px;
            transition: width 0.4s;
        }

        .gen-card:hover .card-ornament {
            width: 60px;
        }

        .gen-card span {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--sepia);
            z-index: 1;
        }

        footer { background: var(--ink); color: rgba(248,244,238,0.4); text-align: center; padding: 60px 24px; font-size: 0.8rem; margin-top: 80px; }
    </style>
</head>
<body>

<header>
    <span class="header-ornament">Korzenie i Tradycja</span>
    <h1>Genealogia</h1>
</header>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">ARCHIWUM RODZINNE</a>
        <button class="menu-btn">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<main>
    <span class="s-label">Zasoby Archiwalne</span>
    <h2 class="s-title">Wybierz sekcję badań</h2>
    
    <div class="gen-grid">
        <a href="drzewo-klanowe.html" class="gen-card">
            <div class="card-ornament"></div>
            <h3>Drzewo klanowe</h3>
            <span>Pełna linia klanu</span>
        </a>

        <a href="wywody.html" class="gen-card">
            <div class="card-ornament"></div>
            <h3>Wywody przodków</h3>
            <span>Dokumentacja historyczna</span>
        </a>

        <a href="drzewo-krainskich.html" class="gen-card">
            <div class="card-ornament"></div>
            <h3>Drzewo Kraińskich</h3>
            <span>Linia męska i żeńska</span>
        </a>

        <a href="drzewo-ladomirskich.html" class="gen-card">
            <div class="card-ornament"></div>
            <h3>Drzewo Ładomirskich</h3>
            <span>Historia rodowa</span>
        </a>
    </div>
</main>

<footer>
    <p>KLAN ŁADOMIRSKICH I KRAIŃSKICH © 1975 – 2026</p>
</footer>

</body>
</html>
