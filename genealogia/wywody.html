<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    padding:40px;
    background:#fdfaf6;
    font-family:Arial;
}

/* GRID GŁÓWNY */
.tree {
    display:grid;
    grid-template-columns:repeat(8, 1fr);
    gap:20px;
    max-width:1400px;
    margin:auto;
}

/* KAFEL */
.box {
    border:1px solid #d8cfc3;
    background:white;
    padding:15px;
    text-align:center;
}

/* POZIOMY */
.row {
    display:contents;
}

/* GENERACJE */

/* 8 */
.lvl-8 .box { grid-column: span 1; }

/* 4 (każdy = 2 kolumny) */
.lvl-4 .box { grid-column: span 2; }

/* 2 (każdy = 4 kolumny) */
.lvl-2 .box { grid-column: span 4; }

/* 1 (pełna szerokość) */
.lvl-1 .box { grid-column: span 8; }

/* ODSTĘPY PIONOWE */
.spacer {
    grid-column:1 / -1;
    height:40px;
}

</style>
</head>

<body>

<div class="tree">

    <!-- 8 -->
    <div class="row lvl-8">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
    </div>

    <div class="spacer"></div>

    <!-- 4 -->
    <div class="row lvl-4">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>

    <div class="spacer"></div>

    <!-- 4 -->
    <div class="row lvl-4">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>

    <div class="spacer"></div>

    <!-- 2 -->
    <div class="row lvl-2">
        <div class="box">1</div>
        <div class="box">2</div>
    </div>

    <div class="spacer"></div>

    <!-- 2 -->
    <div class="row lvl-2">
        <div class="box">1</div>
        <div class="box">2</div>
    </div>

    <div class="spacer"></div>

    <!-- 1 -->
    <div class="row lvl-1">
        <div class="box">1</div>
    </div>

    <div class="spacer"></div>

    <!-- 1 -->
    <div class="row lvl-1">
        <div class="box">1</div>
    </div>

</div>

</body>
</html>
