<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drzewo Genealogiczne | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream: #f8f4ee;
            --warm-white: #fdfaf6;
            --ink: #1e1a14;
            --gold: #9b7d4a;
            --gold-light: #c8a96e; 
            --sepia: #7a6548;
            --sepia-pale: #e8ddd0; 
            --line-color: #b0a496;
        }

        body { margin: 0; padding: 40px 20px; background: var(--warm-white); font-family: 'Jost', sans-serif; color: var(--ink); }

        .tree {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            max-width: 1200px;
            margin: auto;
        }

        /* BOX */
        .box {
            border: 1px solid var(--sepia-pale);
            background: var(--cream);
            padding: 10px;
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            border-left: 3px solid var(--sepia);
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            z-index: 10;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            margin: 0 5px;
        }

        .node { position: relative; display: flex; flex-direction: column; }

        /* LINIE PIONOWE PROSTE */
        .v-line-down::after {
            content: ""; position: absolute; left: 50%; top: 100%;
            width: 1px; height: 25px; background: var(--line-color);
        }
        .v-line-up::before {
            content: ""; position: absolute; left: 50%; bottom: 100%;
            width: 1px; height: 25px; background: var(--line-color);
        }

        /* ŁĄCZNIK POZIOMY (T-SHAPE) */
        .connector-group {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            height: 50px;
            position: relative;
        }

        /* Belka pozioma między dwoma punktami */
        .h-line {
            position: absolute;
            top: 25px;
            height: 1px;
            background: var(--line-color);
        }

        /* Pion w dół od środka belki */
        .v-stem {
            position: absolute;
            top: 25px;
            width: 1px;
            height: 25px;
            background: var(--line-color);
        }

        .spacer-small { grid-column: 1 / -1; height: 25px; }
        .row { display: contents; }

        /* SPANY */
        .lvl-8 .node { grid-column: span 1; }
        .lvl-4 .node { grid-column: span 2; }
        .lvl-2 .node { grid-column: span 4; }
        .lvl-1 .node { grid-column: span 8; }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Wywód Przodków</h1>
    <div style="width:50px; height:1px; background:var(--gold-light); margin:15px auto;"></div>
</div>

<div class="tree">

    <div class="row lvl-8">
        <div class="node v-line-down"><div class="box">1</div></div>
        <div class="node v-line-down"><div class="box">2</div></div>
        <div class="node v-line-down"><div class="box">3</div></div>
        <div class="node v-line-down"><div class="box">4</div></div>
        <div class="node v-line-down"><div class="box">5</div></div>
        <div class="node v-line-down"><div class="box">6</div></div>
        <div class="node v-line-down"><div class="box">7</div></div>
        <div class="node v-line-down"><div class="box">8</div></div>
    </div>

    <div class="connector-group">
        <div class="h-line" style="left: 6.25%; right: 81.25%;"></div> <div class="v-stem" style="left: 12.5%;"></div>
        <div class="h-line" style="left: 31.25%; right: 56.25%;"></div> <div class="v-stem" style="left: 37.5%;"></div>
        <div class="h-line" style="left: 56.25%; right: 31.25%;"></div> <div class="v-stem" style="left: 62.5%;"></div>
        <div class="h-line" style="left: 81.25%; right: 6.25%;"></div> <div class="v-stem" style="left: 87.5%;"></div>
    </div>

    <div class="row lvl-4">
        <div class="node v-line-up v-line-down"><div class="box">A</div></div>
        <div class="node v-line-up v-line-down"><div class="box">B</div></div>
        <div class="node v-line-up v-line-down"><div class="box">C</div></div>
        <div class="node v-line-up v-line-down"><div class="box">D</div></div>
    </div>

    <div class="spacer-small"></div>

    <div class="row lvl-4">
        <div class="node v-line-up v-line-down"><div class="box">A2</div></div>
        <div class="node v-line-up v-line-down"><div class="box">B2</div></div>
        <div class="node v-line-up v-line-down"><div class="box">C2</div></div>
        <div class="node v-line-up v-line-down"><div class="box">D2</div></div>
    </div>

    <div class="connector-group">
        <div class="h-line" style="left: 12.5%; right: 62.5%;"></div> <div class="v-stem" style="left: 25%;"></div>
        <div class="h-line" style="left: 62.5%; right: 12.5%;"></div> <div class="v-stem" style="left: 75%;"></div>
    </div>

    <div class="row lvl-2">
        <div class="node v-line-up v-line-down"><div class="box">Para 1</div></div>
        <div class="node v-line-up v-line-down"><div class="box">Para 2</div></div>
    </div>

    <div class="spacer-small"></div>

    <div class="row lvl-2">
        <div class="node v-line-up v-line-down"><div class="box">P 1.2</div></div>
        <div class="node v-line-up v-line-down"><div class="box">P 2.2</div></div>
    </div>

    <div class="connector-group">
        <div class="h-line" style="left: 25%; right: 25%;"></div> <div class="v-stem" style="left: 50%;"></div>
    </div>

    <div class="row lvl-1">
        <div class="node v-line-up v-line-down"><div class="box">Jedność</div></div>
    </div>

    <div class="spacer-small"></div>

    <div class="row lvl-1">
        <div class="node v-line-up"><div class="box">Finał</div></div>
    </div>

</div>

</body>
</html>
