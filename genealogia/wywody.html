<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Wywód | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* KLUCZOWA KOLORYSTYKA ZE STRONY GITHUB IO */
        :root {
            --cream: #f8f4ee;
            --parchment: #ede8df;
            --warm-white: #fdfaf6;
            --ink: #1e1a14;
            --gold: #9b7d4a;
            --gold-light: #c8a96e; 
            --sepia: #7a6548;
            --sepia-pale: #e8ddd0; 
            --line: rgba(122, 101, 72, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Jost', sans-serif; 
            background-color: var(--warm-white); 
            color: var(--ink); 
            line-height: 1.6; 
        }

        /* NAWIGACJA IDENTYCZNA JAK W ARCHIWUM */
        nav { 
            background-color: var(--ink); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 2px 20px rgba(0,0,0,0.1); 
        }
        .nav-inner { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 16px 24px; 
        }
        .nav-logo { 
            font-family: 'Cormorant Garamond', serif; 
            color: var(--gold-light); 
            text-decoration: none; 
            font-size: 1.2rem; 
            letter-spacing: 2px; 
            font-weight: 400; 
            border-right: 1px solid rgba(200, 169, 110, 0.3); 
            padding-right: 20px; 
        }
        .nav-back-link { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            color: var(--gold-light); 
            text-decoration: none; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        /* NAGŁÓWEK I LINIE */
        header.intro-section { 
            text-align: center; 
            padding: 60px 24px 20px; 
        }
        .s-label { 
            font-size: .7rem; 
            letter-spacing: .4em; 
            text-transform: uppercase; 
            color: var(--sepia-light); 
            display: block; 
            margin-bottom: 15px; 
        }
        h1 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: clamp(1.8rem, 4vw, 2.8rem); 
            font-weight: 300; 
            margin-bottom: 10px; 
        }
        .s-line { 
            width: 60px; 
            height: 1px; 
            background: var(--gold-light); 
            margin: 20px auto; 
            opacity: 0.6; 
        }

        /* UKŁAD KAFELKÓW */
        .container {
            max-width: 800px;
            margin: 0 auto 80px;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Bardzo blisko siebie */
            padding: 0 20px;
        }

        .tile {
            background: var(--cream);
            border: 1px solid var(--sepia-pale);
            padding: 20px;
            box-shadow: 0 4px 12px rgba(122, 101, 72, 0.03);
            border-left: 3px solid var(--sepia); /* Styl Archiwum L&K */
        }

        /* SEKACJA ZDJĘĆ / HERBÓW */
        .photo-row {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
        }

        .photo-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 70px;
        }

        .photo-frame {
            width: 70px;
            height: 85px;
            background: #fff;
            border: 1px dashed var(--sepia-light);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .photo-frame img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .desc-herb {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
            margin-top: 5px;
            font-weight: 500;
        }

        .tile-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem;
            line-height: 1.4;
            color: var(--ink);
        }

        /* STOPKA */
        footer { 
            background: var(--ink); 
            color: rgba(248,244,238,0.3); 
            text-align: center; 
            padding: 60px 24px; 
            font-size: 0.75rem; 
            letter-spacing: 1px; 
        }
    </style>
</head>
