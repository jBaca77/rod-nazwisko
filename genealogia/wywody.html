<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    padding:40px;
    background:#fdfaf6;
    font-family:Arial;
}

/* GRID */
.tree {
    display:grid;
    grid-template-columns:repeat(8, 1fr);
    gap:30px 20px;
    max-width:1400px;
    margin:auto;
}

/* KAFEL */
.box {
    border:1px solid #d8cfc3;
    background:white;
    padding:15px;
    text-align:center;
    position:relative;
}

/* PIONOWA LINIA W DÓŁ */
.box::after {
    content:"";
    position:absolute;
    left:50%;
    bottom:-30px;
    width:1px;
    height:30px;
    background:#d8cfc3;
    transform:translateX(-50%);
}

/* USUWAMY linię dla ostatniego poziomu */
.last .box::after {
    display:none;
}

/* POZIOMA LINIA (łączenie dzieci) */
.group {
    position:relative;
}

.group::before {
    content:"";
    position:absolute;
    top:-30px;
    left:10%;
    right:10%;
    height:1px;
    background:#d8cfc3;
}

/* GRID SPANY */
.lvl-8 .box { grid-column: span 1; }
.lvl-4 .box { grid-column: span 2; }
.lvl-2 .box { grid-column: span 4; }
.lvl-1 .box { grid-column: span 8; }

/* ROW */
.row {
    display:contents;
}

.spacer {
    grid-column:1 / -1;
    height:30px;
}

</style>
</head>

<body>

<div class="tree">

    <!-- 8 -->
    <div class="row lvl-8">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
    </div>

    <div class="spacer"></div>

    <!-- 4 -->
    <div class="row lvl-4">
        <div class="group"><div class="box">1</div></div>
        <div class="group"><div class="box">2</div></div>
        <div class="group"><div class="box">3</div></div>
        <div class="group"><div class="box">4</div></div>
    </div>

    <div class="spacer"></div>

    <!-- 4 -->
    <div class="row lvl-4">
        <div class="group"><div class="box">1</div></div>
        <div class="group"><div class="box">2</div></div>
        <div class="group"><div class="box">3</div></div>
        <div class="group"><div class="box">4</div></div>
    </div>

    <div class="spacer"></div>

    <!-- 2 -->
    <div class="row lvl-2">
        <div class="group"><div class="box">1</div></div>
        <div class="group"><div class="box">2</div></div>
    </div>

    <div class="spacer"></div>

    <!-- 2 -->
    <div class="row lvl-2">
        <div class="group"><div class="box">1</div></div>
        <div class="group"><div class="box">2</div></div>
    </div>

    <div class="spacer"></div>

    <!-- 1 -->
    <div class="row lvl-1">
        <div class="group"><div class="box">1</div></div>
    </div>

    <div class="spacer"></div>

    <!-- 1 -->
    <div class="row lvl-1 last">
        <div class="box">1</div>
    </div>

</div>

</body>
</html>
