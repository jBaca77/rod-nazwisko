<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Wywód | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cream: #f8f4ee;
            --parchment: #ede8df;
            --warm-white: #fdfaf6;
            --ink: #1e1a14;
            --gold: #9b7d4a;
            --gold-light: #c8a96e; 
            --sepia: #7a6548;
            --sepia-pale: #e8ddd0; 
            --line: rgba(122, 101, 72, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Jost', sans-serif; 
            background-color: var(--warm-white); 
            color: var(--ink); 
            line-height: 1.4; 
        }

        /* NAWIGACJA */
        nav { background-color: var(--ink); position: sticky; top: 0; z-index: 1000; }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; }
        .nav-logo { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); text-decoration: none; font-size: 1.1rem; letter-spacing: 2px; border-right: 1px solid rgba(200, 169, 110, 0.3); padding-right: 20px; }
        .nav-back-link { display: flex; align-items: center; gap: 8px; color: var(--gold-light); text-decoration: none; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; }

        header.intro-section { text-align: center; padding: 40px 24px 10px; }
        .s-label { font-size: .6rem; letter-spacing: .4em; text-transform: uppercase; color: var(--sepia-light); display: block; margin-bottom: 10px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; }
        .s-line { width: 50px; height: 1px; background: var(--gold-light); margin: 15px auto; opacity: 0.6; }

        /* KONTENER GŁÓWNY */
        .main-container {
            max-width: 1100px;
            margin: 0 auto 60px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 20px;
        }

        /* SEKCJA (2 MAŁE + 1 SZEROKI) */
        .tree-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 10px;
        }

        .left-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* STYL KAFELKA */
        .tile {
            background: var(--cream);
            border: 1px solid var(--sepia-pale);
            padding: 12px 15px;
            box-shadow: 0 2px 8px rgba(122, 101, 72, 0.03);
            border-left: 3px solid var(--sepia);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right-tile {
            border-left: 3px solid var(--gold);
        }

        /* ZDJĘCIA / HERBY */
        .photo-row {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .photo-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 55px;
        }

        .photo-frame {
            width: 55px;
            height: 65px;
            background: #fff;
            border: 1px dashed var(--sepia-light);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .desc-herb {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
            margin-top: 3px;
        }

        .tile-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            color: var(--ink);
        }

        footer { background: var(--ink); color: rgba(248,244,238,0.3); text-align: center; padding: 40px 24px; font-size: 0.7rem; letter-spacing: 1px; }
    </style>
</head>
