<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Wywód | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cream: #f8f4ee;
            --parchment: #ede8df;
            --warm-white: #fdfaf6;
            --ink: #1e1a14;
            --gold: #9b7d4a;
            --gold-light: #c8a96e; 
            --sepia: #7a6548;
            --sepia-pale: #e8ddd0; 
            --line: rgba(122, 101, 72, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Jost', sans-serif; 
            background-color: var(--warm-white); 
            color: var(--ink); 
            line-height: 1.5; 
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px; /* Bliskie odstępy */
        }

        .tile {
            background: var(--cream);
            border: 1px solid var(--sepia-pale);
            padding: 15px 20px;
            box-shadow: 0 2px 10px rgba(122, 101, 72, 0.05);
            border-left: 4px solid var(--sepia);
        }

        /* Sekcja zdjęć */
        .photo-section {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            justify-content: flex-start;
        }

        .photo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px; /* Szerokość dostosowana pod herb */
        }

        .photo-placeholder {
            width: 80px;
            height: 100px;
            background-color: #fff;
            border: 1px dashed var(--sepia-light);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .photo-placeholder img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .label-herb {
            font-family: 'Jost', sans-serif;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
            margin-top: 5px;
        }

        .tile-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: var(--ink);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .s-line { width: 60px; height: 1px; background: var(--gold-light); margin: 20px auto; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 2.5rem;">Archiwum L&K</h1>
        <div class="s-line"></div>
    </div>
