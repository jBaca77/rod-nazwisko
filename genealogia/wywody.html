<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drzewo Genealogiczne | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream: #f8f4ee;
            --warm-white: #fdfaf6;
            --ink: #1e1a14;
            --gold-light: #c8a96e; 
            --sepia: #7a6548;
            --sepia-pale: #e8ddd0; 
            --line-color: #d8cfc3;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            background: var(--warm-white);
            font-family: 'Jost', sans-serif;
            color: var(--ink);
        }

        .tree {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            max-width: 1200px;
            margin: auto;
            /* Usunięcie gap, by linie mogły się stykać */
            gap: 0 10px;
        }

        /* STYL KAFELKA */
        .box {
            border: 1px solid var(--sepia-pale);
            background: var(--cream);
            padding: 10px;
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            border-left: 3px solid var(--sepia);
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            z-index: 5;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        .node { position: relative; display: flex; flex-direction: column; }

        /* LINIE PIONOWE - łączą się z boxem */
        .node.child::after, .node.pass::after {
            content: ""; position: absolute; left: 50%; top: 100%;
            width: 1px; height: 31px; /* Wysokość idealnie do linii poziomej lub boxa */
            background: var(--line-color);
            transform: translateX(-50%); z-index: 1;
        }

        .node.parent::before, .node.pass::before {
            content: ""; position: absolute; left: 50%; bottom: 100%;
            width: 1px; height: 31px; 
            background: var(--line-color);
            transform: translateX(-50%); z-index: 1;
        }

        /* ŁĄCZENIE PAR (LINIA POZIOMA) */
        .pair::before {
            content: ""; position: absolute; top: -30px;
            left: 25%; right: 25%; height: 1px; background: var(--line-color);
            z-index: 1;
        }

        /* PION OD LINII POZIOMEJ DO BOXA POWYŻEJ */
        .pair::after {
            content: ""; position: absolute; top: -30px; left: 50%;
            width: 1px; height: 30px; background: var(--line-color);
            transform: translateX(-50%); z-index: 1;
        }

        /* SPACERY DOPASOWANE DO WYSOKOŚCI LINII */
        .spacer { grid-column: 1 / -1; height: 60px; }
        .row { display: contents; }

        /* GRID SPANY */
        .lvl-8 .node { grid-column: span 1; }
        .lvl-4 .node { grid-column: span 2; }
        .lvl-2 .node { grid-column: span 4; }
        .lvl-1 .node { grid-column: span 8; }

        .header { text-align: center; margin-bottom: 60px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; letter-spacing: 2px; }
        .s-line { width: 50px; height: 1px; background: var(--gold-light); margin: 15px auto; }
    </style>
</head>

<body>

<div class="header">
    <h1>Wywód Przodków</h1>
    <div class="s-line"></div>
</div>

<div class="tree">

    <div class="row lvl-8">
        <div class="node child"><div class="box">1</div></div>
        <div class="node child"><div class="box">2</div></div>
        <div class="node child"><div class="box">3</div></div>
        <div class="node child"><div class="box">4</div></div>
        <div class="node child"><div class="box">5</div></div>
        <div class="node child"><div class="box">6</div></div>
        <div class="node child"><div class="box">7</div></div>
        <div class="node child"><div class="box">8</div></div>
    </div>

    <div class="spacer"></div>

    <div class="row lvl-4">
        <div class="node pair parent pass"><div class="box">A</div></div>
        <div class="node pair parent pass"><div class="box">B</div></div>
        <div class="node pair parent pass"><div class="box">C</div></div>
        <div class="node pair parent pass"><div class="box">D</div></div>
    </div>

    <div class="spacer"></div>

    <div class="row lvl-4">
        <div class="node child pass"><div class="box">A2</div></div>
        <div class="node child pass"><div class="box">B2</div></div>
        <div class="node child pass"><div class="box">C2</div></div>
        <div class="node child pass"><div class="box">D2</div></div>
    </div>

    <div class="spacer"></div>

    <div class="row lvl-2">
        <div class="node pair parent pass"><div class="box">Para I</div></div>
        <div class="node pair parent pass"><div class="box">Para II</div></div>
    </div>

    <div class="spacer"></div>

    <div class="row lvl-2">
        <div class="node child pass"><div class="box">Para I.2</div></div>
        <div class="node child pass"><div class="box">Para II.2</div></div>
    </div>

    <div class="spacer"></div>

    <div class="row lvl-1">
        <div class="node pair parent pass"><div class="box">Jedność</div></div>
    </div>

    <div class="spacer"></div>

    <div class="row lvl-1">
        <div class="node parent"><div class="box">Finał</div></div>
    </div>

</div>

</body>
</html>
