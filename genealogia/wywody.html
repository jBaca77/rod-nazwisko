<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drzewo Genealogiczne | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream: #f8f4ee;
            --parchment: #ede8df;
            --warm-white: #fdfaf6;
            --ink: #1e1a14;
            --gold: #9b7d4a;
            --gold-light: #c8a96e; 
            --sepia: #7a6548;
            --sepia-pale: #e8ddd0; 
            --line-color: #d8cfc3;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Jost', sans-serif; 
            background-color: var(--warm-white); 
            color: var(--ink); 
            line-height: 1.4; 
        }

        /* NAWIGACJA */
        nav { background-color: var(--ink); position: sticky; top: 0; z-index: 1000; }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; }
        .nav-logo { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); text-decoration: none; font-size: 1.1rem; letter-spacing: 2px; border-right: 1px solid rgba(200, 169, 110, 0.3); padding-right: 20px; }
        .nav-back-link { display: flex; align-items: center; gap: 8px; color: var(--gold-light); text-decoration: none; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; }

        /* NAGŁÓWEK */
        header.intro-section { text-align: center; padding: 50px 24px 20px; }
        .s-label { font-size: .6rem; letter-spacing: .4em; text-transform: uppercase; color: var(--sepia); display: block; margin-bottom: 10px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; }
        .s-line { width: 50px; height: 1px; background: var(--gold-light); margin: 15px auto; opacity: 0.6; }

        /* STRUKTURA DRZEWA (GRID) */
        .tree-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 0 10px;
            max-width: 1200px;
            margin: 0 auto 100px;
            padding: 0 20px;
        }

        .node { position: relative; display: flex; flex-direction: column; justify-content: center; }
        
        /* KAFELEK (BOX) */
        .box {
            background: var(--cream);
            border: 1px solid var(--sepia-pale);
            padding: 10px 5px;
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            font-weight: 600;
            border-left: 3px solid var(--sepia);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            z-index: 5;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        /* ŁĄCZNIKI PIONOWE */
        .node.child::after, .node.pass-down::after {
            content: ""; position: absolute; left: 50%; top: 100%;
            width: 1px; height: 21px; background: var(--line-color);
            transform: translateX(-50%);
        }

        .node.parent::before, .node.pass-up::before {
            content: ""; position: absolute; left: 50%; bottom: 100%;
            width: 1px; height: 21px; background: var(--line-color);
            transform: translateX(-50%);
        }

        /* ŁĄCZNIKI POZIOME (DLA PAR) */
        .pair-connector { position: relative; }
        .pair-connector::before {
            content: ""; position: absolute; top: -21px;
            left: 25%; right: 25%; height: 1px; background: var(--line-color);
        }
        .pair-connector::after {
            content: ""; position: absolute; top: -21px; left: 50%;
            width: 1px; height: 21px; background: var(--line-color);
            transform: translateX(-50%);
        }

        /* POZIOMY GRIDU */
        .row { display: contents; }
        .lvl-8 .node { grid-column: span 1; }
        .lvl-4 .node { grid-column: span 2; }
        .lvl-2 .node { grid-column: span 4; }
        .lvl-1 .node { grid-column: span 8; }

        .spacer { grid-column: 1 / -1; height: 40px; }

        /* STOPKA */
        footer { background: var(--ink); color: rgba(248,244,238,0.3); text-align: center; padding: 40px 24px; font-size: 0.7rem; letter-spacing: 1px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="#" class="nav-logo">ARCHIWUM L&K</a>
        <a href="#" class="nav-back-link">Wstecz</a>
    </div>
</nav>

<header class="intro-section">
    <span class="s-label">Genealogia Rodu</span>
    <h1>Drzewo Przodków</h1>
    <div class="s-line"></div>
</header>

<div class="tree-container">

    <div class="row lvl-8">
        <div class="node child"><div class="box">Pradziadek</div></div>
        <div class="node child"><div class="box">Prababcia</div></div>
        <div class="node child"><div class="box">Pradziadek</div></div>
        <div class="node child"><div class="box">Prababcia</div></div>
        <div class="node child"><div class="box">Pradziadek</div></div>
        <div class="node child"><div class="box">Prababcia</div></div>
        <div class="node child"><div class="box">Pradziadek</div></div>
        <div class="node child"><div class="box">Prababcia</div></div>
    </div>

    <div class="spacer"></div>

    <div class="row lvl-4">
        <div class="node pair-connector parent pass-down"><div class="box">Dziadek</div></div>
        <div class="node pair-connector parent pass-down"><div class="box">Babcia</div></div>
        <div class="node pair-connector parent pass-down"><div class="box">Dziadek</div></div>
        <div class="node pair-connector parent pass-down"><div class="box">Babcia</div></div>
    </div>

    <div class="spacer"></div>

    <div class="row lvl-2">
        <div class="node pair-connector parent pass-down"><div class="box">Ojciec</div></div>
        <div class="node pair-connector parent pass-down"><div class="box">Matka</div></div>
    </div>

    <div class="spacer"></div>

    <div class="row lvl-1">
        <div class="node pair-connector parent"><div class="box">Potomek</div></div>
    </div>

</div>

<footer>
    <p>KLAN ŁADOMIRSKICH I KRAIŃSKICH © 1975 – 2026</p>
</footer>

</body>
</html>
