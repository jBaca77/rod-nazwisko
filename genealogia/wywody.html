<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Drzewo genealogiczne</title>

<style>
body {
    margin:0;
    padding:40px;
    background:#fdfaf6;
    font-family:Arial;
}

/* GRID */
.tree {
    display:grid;
    grid-template-columns:repeat(8, 1fr);
    gap:60px 20px;
    max-width:1400px;
    margin:auto;
}

/* BOX */
.box {
    border:1px solid #d8cfc3;
    background:white;
    padding:12px;
    text-align:center;
    position:relative;
}

/* NODE */
.node {
    position:relative;
}

/* --- LINIE --- */

/* dół */
.node.child::after {
    content:"";
    position:absolute;
    left:50%;
    top:100%;
    width:1px;
    height:30px;
    background:#d8cfc3;
    transform:translateX(-50%);
}

/* góra */
.node.parent::before {
    content:"";
    position:absolute;
    left:50%;
    bottom:100%;
    width:1px;
    height:30px;
    background:#d8cfc3;
    transform:translateX(-50%);
}

/* przelot (góra + dół) */
.node.pass::before,
.node.pass::after {
    content:"";
    position:absolute;
    left:50%;
    width:1px;
    background:#d8cfc3;
    transform:translateX(-50%);
}

.node.pass::before {
    bottom:100%;
    height:30px;
}

.node.pass::after {
    top:100%;
    height:30px;
}

/* PARA */
.pair {
    position:relative;
}

/* pozioma linia między dziećmi */
.pair::before {
    content:"";
    position:absolute;
    top:-30px;
    left:25%;
    right:25%;
    height:1px;
    background:#d8cfc3;
}

/* pion do rodzica */
.pair::after {
    content:"";
    position:absolute;
    top:-30px;
    left:50%;
    width:1px;
    height:30px;
    background:#d8cfc3;
    transform:translateX(-50%);
}

/* GRID SPANY */
.lvl-8 .node { grid-column: span 1; }
.lvl-4 .node { grid-column: span 2; }
.lvl-2 .node { grid-column: span 4; }
.lvl-1 .node { grid-column: span 8; }

/* ROW */
.row {
    display:contents;
}

/* ODSTĘP */
.spacer {
    grid-column:1/-1;
    height:30px;
}
</style>
</head>

<body>

<div class="tree">

<!-- 8 -->
<div class="row lvl-8">
    <div class="node child"><div class="box">1</div></div>
    <div class="node child"><div class="box">2</div></div>
    <div class="node child"><div class="box">3</div></div>
    <div class="node child"><div class="box">4</div></div>
    <div class="node child"><div class="box">5</div></div>
    <div class="node child"><div class="box">6</div></div>
    <div class="node child"><div class="box">7</div></div>
    <div class="node child"><div class="box">8</div></div>
</div>

<div class="spacer"></div>

<!-- 4 -->
<div class="row lvl-4">
    <div class="node pair parent pass"><div class="box">1</div></div>
    <div class="node pair parent pass"><div class="box">2</div></div>
    <div class="node pair parent pass"><div class="box">3</div></div>
    <div class="node pair parent pass"><div class="box">4</div></div>
</div>

<div class="spacer"></div>

<!-- 4 -->
<div class="row lvl-4">
    <div class="node child pass"><div class="box">1</div></div>
    <div class="node child pass"><div class="box">2</div></div>
    <div class="node child pass"><div class="box">3</div></div>
    <div class="node child pass"><div class="box">4</div></div>
</div>

<div class="spacer"></div>

<!-- 2 -->
<div class="row lvl-2">
    <div class="node pair parent pass"><div class="box">1</div></div>
    <div class="node pair parent pass"><div class="box">2</div></div>
</div>

<div class="spacer"></div>

<!-- 2 -->
<div class="row lvl-2">
    <div class="node child pass"><div class="box">1</div></div>
    <div class="node child pass"><div class="box">2</div></div>
</div>

<div class="spacer"></div>

<!-- 1 -->
<div class="row lvl-1">
    <div class="node pair parent pass"><div class="box">1</div></div>
</div>

<div class="spacer"></div>

<!-- 1 -->
<div class="row lvl-1">
    <div class="node parent"><div class="box">1</div></div>
</div>

</div>

</body>
</html>
