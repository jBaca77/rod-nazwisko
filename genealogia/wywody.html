<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wywody przodków | Archiwum L&K</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#fdfaf6;
    --line:#d8cfc3;
    --gold:#9b7d4a;
    --ink:#1e1a14;
}

body {
    margin:0;
    background:var(--bg);
    font-family:'Jost',sans-serif;
}

/* NAV */
nav {
    background:var(--ink);
    padding:15px 25px;
    color:#c8a96e;
    font-family:'Cormorant Garamond';
}

/* WRAPPER */
.wrapper {
    overflow:auto;
    padding:40px;
}

/* DRZEWO */
.tree {
    display:flex;
    flex-direction:column;
    gap:80px;
    min-width:1200px;
}

/* POKOLENIE */
.generation {
    display:flex;
    justify-content:center;
    gap:60px;
    position:relative;
}

/* OSOBA */
.person {
    min-width:180px;
    text-align:center;
    position:relative;
}

.box {
    padding:12px 10px;
    border:1px solid var(--line);
    background:white;
    font-size:13px;
}

/* LINIE PIONOWE */
.person::after {
    content:"";
    position:absolute;
    bottom:-40px;
    left:50%;
    width:1px;
    height:40px;
    background:var(--line);
}

/* USUWANIE linii dla ostatniego poziomu */
.generation:last-child .person::after {
    display:none;
}

/* LINIA POZIOMA (łączenie dzieci) */
.connector {
    position:absolute;
    top:-40px;
    left:0;
    right:0;
    height:1px;
    background:var(--line);
}

/* PARA */
.couple {
    display:flex;
    gap:10px;
}

/* SUBTLE OZDOBA */
.box:hover {
    border-color:var(--gold);
}

</style>
</head>

<body>

<nav>ARCHIWUM L&K</nav>

<div class="wrapper">

<div class="tree">

    <!-- POKOLENIE 1 -->
    <div class="generation">
        <div class="person">
            <div class="box">Osoba</div>
        </div>
    </div>

    <!-- POKOLENIE 2 -->
    <div class="generation">

        <div class="person">
            <div class="connector"></div>
            <div class="couple">
                <div class="box">Osoba</div>
                <div class="box">Osoba</div>
            </div>
        </div>

        <div class="person">
            <div class="connector"></div>
            <div class="couple">
                <div class="box">Osoba</div>
                <div class="box">Osoba</div>
            </div>
        </div>

    </div>

    <!-- POKOLENIE 3 -->
    <div class="generation">

        <div class="person">
            <div class="connector"></div>
            <div class="box">Osoba</div>
        </div>

        <div class="person">
            <div class="connector"></div>
            <div class="box">Osoba</div>
        </div>

        <div class="person">
            <div class="connector"></div>
            <div class="box">Osoba</div>
        </div>

    </div>

</div>

</div>

</body>
</html>
