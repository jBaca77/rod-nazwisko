<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Wywód | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cream: #f8f4ee;
            --parchment: #ede8df;
            --warm-white: #fdfaf6;
            --ink: #1e1a14;
            --gold: #9b7d4a;
            --gold-light: #c8a96e; 
            --sepia: #7a6548;
            --sepia-pale: #e8ddd0; 
            --line: rgba(122, 101, 72, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Jost', sans-serif; 
            background-color: var(--warm-white); 
            color: var(--ink); 
            line-height: 1.7; 
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px; /* Bliskie odstępy między kafelkami */
        }

        .tile {
            background: var(--cream);
            border: 1px solid var(--sepia-pale);
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 10px rgba(122, 101, 72, 0.05);
            border-left: 4px solid var(--sepia); /* Akcent graficzny */
            transition: transform 0.2s ease;
        }

        .tile:hover {
            border-color: var(--gold);
            transform: translateX(5px);
        }

        .tile-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            color: var(--ink);
            letter-spacing: 1px;
        }

        /* Opcjonalny nagłówek dla zachowania stylu Archiwum */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .s-line { 
            width: 60px; 
            height: 1px; 
            background: var(--gold-light); 
            margin: 20px auto; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 2.5rem;">Archiwum L&K</h1>
        <div class="s-line"></div>
    </div>

    <div class="container">
        <div class="tile"><div class="tile-text">próba</div></div>
        <div class="tile"><div class="tile-text">próba</div></div>
        <div class="tile"><div class="tile-text">próba</div></div>
        <div class="tile"><div class="tile-text">próba</div></div>
        <div class="tile"><div class="tile-text">próba</div></div>
        <div class="tile"><div class="tile-text">próba</div></div>
        <div class="tile"><div class="tile-text">próba</div></div>
        <div class="tile"><div class="tile-text">próba</div></div>
    </div>

</body>
</html>
