<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kronika Zjazdów z Legendą | Klan Ładomirskich i Kraińskich</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --cream: #f8f4ee; --parchment: #ede8df; --warm-white: #fdfaf6;
    --ink: #1e1a14; --ink-light: #3d3628; --sepia: #7a6548;
    --sepia-light: #b09a7e; --sepia-pale: #e8ddd0; --gold: #9b7d4a;
    --gold-light: #c8a96e; --green-dark: #2c3e2d; --line: rgba(122, 101, 72, 0.2);
    /* Kolory Gałęzi ze starej strony */
    --branch-ladomirscy: #9b7d4a; /* Złoty */
    --branch-krainscy: #a94442; /* Czerwony */
    --branch-wspolne: #3c763d; /* Zielony */
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background-color: var(--warm-white); color: var(--ink); line-height: 1.7; }

  /* NAVIGATION */
  nav { background-color: var(--ink); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 20px rgba(0,0,0,.3); }
  .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; }
  .nav-logo { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); text-decoration: none; font-size: 1.2rem; letter-spacing: 2px; }
  .menu-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
  .menu-btn span { display: block; width: 28px; height: 1.5px; background: var(--gold-light); transition: 0.3s; }

  /* DRAWER */
  .drawer { position: fixed; top: 0; right: -320px; width: 320px; height: 100vh; background: var(--ink); z-index: 1050; padding: 100px 40px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
  .drawer.open { right: 0; }
  .drawer-links { list-style: none; }
  .drawer-links li { margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
  .drawer-links a { color: var(--cream); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; display: block; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1040; opacity: 0; pointer-events: none; transition: 0.3s; }
  .overlay.active { opacity: 1; pointer-events: auto; }

  /* CONTENT */
  main { max-width: 1100px; margin: 0 auto; padding: 60px 24px; }
  .s-label { font-size: .65rem; letter-spacing: .3em; text-transform: uppercase; color: var(--sepia-light); text-align: center; display: block; margin-bottom: 10px; }
  .s-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 40px; text-align: center; }

  /* MAP & LEGENDA */
  #map { height: 500px; width: 100%; border: 1px solid var(--sepia-pale); filter: sepia(10%); margin-bottom: 20px; z-index: 10; }
  .map-legend { background: var(--cream); padding: 20px; border: 1px solid var(--sepia-pale); margin-bottom: 60px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: var(--sepia); }
  .legend-color { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); }

  /* GRID */
  .zjazdy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .zjazd-card { background: var(--cream); padding: 30px; border: 1px solid var(--sepia-pale); text-decoration: none; color: inherit; transition: 0.3s; display: flex; flex-direction: column; }
  .zjazd-card:hover { transform: translateY(-5px); border-color: var(--gold); background: var(--parchment); }
  .z-num { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--gold); margin-bottom: 10px; opacity: 0.7; }
  .z-place { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; line-height: 1.2; margin-bottom: 5px; }
  .z-date { font-size: .75rem; font-weight: 500; color: var(--sepia); text-transform: uppercase; letter-spacing: 1px; }
  .z-branch { font-size: 0.7rem; color: var(--sepia-light); margin-top: 5px; font-style: italic; }
  .z-link { margin-top: auto; padding-top: 15px; font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); font-weight: 600; }

  footer { background: var(--ink); color: rgba(248,244,238,0.4); text-align: center; padding: 60px 24px; margin-top: 80px; font-size: 0.8rem; }
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">ARCHIWUM L&K</a>
    <button class="menu-btn" id="menuBtn">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<aside class="drawer" id="drawer">
  <ul class="drawer-links">
    <li><a href="index.html">Strona Główna</a></li>
    <li><a href="historia.html">Historia Klanu</a></li>
    <li><a href="genealogia.html">Genealogia</a></li>
    <li><a href="zjazdy.html" style="color:var(--gold-light)">Kronika Zjazdów</a></li>
    <li><a href="pamiec.html">Pamięć</a></li>
  </ul>
</aside>

<main>
  <span class="s-label">Pół wieku wspólnych spotkań</span>
  <h1 class="s-title">Kronika Zjazdów Rodzinnych</h1>

  <div id="map"></div>
  <div class="map-legend">
    <div class="legend-item"><div class="legend-color" style="background:var(--branch-ladomirscy)"></div><span>Gałąź Ładomirskich</span></div>
    <div class="legend-item"><div class="legend-color" style="background:var(--branch-krainscy)"></div><span>Gałąź Kraińskich</span></div>
    <div class="legend-item"><div class="legend-color" style="background:var(--branch-wspolne)"></div><span>Zjazdy Wspólne / Rada Klanu</span></div>
  </div>

  <div class="zjazdy-grid" id="zjazdy-container">
    </div>
</main>

<footer>
  <p>Klan Ładomirskich i Kraińskich © 1975 – 2026</p>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // DANE ZJAZDÓW POBRANE ZE STRONY (z przypisanym typem gałęzi)
  // t: 1 - Ładomirscy (Złoty), 2 - Kraińscy (Czerwony), 3 - Wspólne (Zielony)
  const zjazdyData = [
    { n: "I", p: "Modlin", d: "1975", c: [52.443, 20.690], t: 1, b: "Ładomirscy" },
    { n: "II", p: "Szalejów Dolny", d: "1980", c: [50.435, 16.578], t: 2, b: "Kraińscy" },
    { n: "III", p: "Jankowice", d: "1983", c: [50.155, 18.423], t: 3, b: "Wspólny" },
    { n: "IV", p: "Trzebieszowice", d: "1985", c: [50.347, 16.782], t: 1, b: "Ładomirscy" },
    { n: "V", p: "Trzebieszowice", d: "1987", c: [50.347, 16.782], t: 1, b: "Ładomirscy" },
    { n: "VI", p: "Łopuszna", d: "1989", c: [49.482, 20.130], t: 3, b: "Wspólny" },
    { n: "VII", p: "Piwniczna Zdrój", d: "1991", c: [49.435, 20.713], t: 3, b: "Wspólny" },
    { n: "VIII", p: "Sorkwity", d: "1993", c: [53.839, 21.139], t: 3, b: "Wspólny" },
    { n: "IX", p: "Dziwnów", d: "1995", c: [54.021, 14.736], t: 3, b: "Wspólny" },
    { n: "X", p: "Bąblin", d: "1997", c: [52.684, 16.772], t: 3, b: "Wspólny" },
    { n: "XI", p: "Myczkowce", d: "1999", c: [49.426, 22.408], t: 3, b: "Wspólny" },
    { n: "XII", p: "Jarnołtówek", d: "2001", c: [50.288, 17.442], t: 3, b: "Wspólny" },
    { n: "XIII", p: "Stawiska", d: "2003", c: [54.041, 23.059], t: 3, b: "Wspólny" },
    { n: "XIV", p: "Wągromiec", d: "2005", c: [52.807, 17.200], t: 3, b: "Wspólny" },
    { n: "XV", p: "Bukowina Tatrzańska", d: "2007", c: [49.342, 20.106], t: 3, b: "Wspólny" },
    { n: "XVI", p: "Okuninka", d: "2009", c: [51.488, 23.535], t: 3, b: "Wspólny" },
    { n: "XVII", p: "Krościenko", d: "2011", c: [49.439, 20.443], t: 3, b: "Wspólny" },
    { n: "XVIII", p: "Popowo - Letnisko", d: "2013", c: [52.540, 21.130], t: 3, b: "Wspólny" },
    { n: "XIX", p: "Krynica Morska", d: "2015", c: [54.383, 19.444], t: 3, b: "Wspólny" },
    { n: "XX", p: "Boszkowo", d: "2017", c: [51.943, 16.324], t: 3, b: "Wspólny" },
    { n: "XXI", p: "Międzybrodzie Żywieckie", d: "2019", c: [49.774, 19.221], t: 3, b: "Wspólny" },
    { n: "XXII", p: "Krzyże", d: "2022", c: [53.615, 21.579], t: 3, b: "Wspólny" },
    { n: "XXIII", p: "Borowice", d: "2024", c: [50.793, 15.694], t: 3, b: "Wspólny" },
    { n: "XXIV", p: "Bocheniec", d: "2026", c: [50.817, 20.268], t: 3, b: "Wspólny" }
  ];

  // Inicjalizacja Mapy
  const map = L.map('map').setView([52.0, 19.0], 6);
  L.tileLayer('https://{s}.tile.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

  // Definicje Kolorowych Ikon Pinezek
  const createIcon = (color) => L.divIcon({
    className: 'custom-pin',
    html: `<div style="background-color:${color}; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.3);"></div>`,
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  });

  const icons = {
    1: createIcon(getComputedStyle(document.documentElement).getPropertyValue('--branch-ladomirscy')),
    2: createIcon(getComputedStyle(document.documentElement).getPropertyValue('--branch-krainscy')),
    3: createIcon(getComputedStyle(document.documentElement).getPropertyValue('--branch-wspolne'))
  };

  const container = document.getElementById('zjazdy-container');

  zjazdyData.forEach((z, index) => {
    const roman = z.n;
    const filename = `zjazd${index + 1}.html`;

    // Dodaj do listy (z informacją o gałęzi)
    container.innerHTML += `
      <a href="${filename}" class="zjazd-card">
        <div class="z-num">${roman}</div>
        <div class="z-place">${z.p}</div>
        <div class="z-date">${z.d}</div>
        <div class="z-branch">Gałąź: ${z.b}</div>
        <div class="z-link">Zobacz szczegóły →</div>
      </a>
    `;

    // Dodaj pinezkę na mapę z odpowiednią ikoną
    L.marker(z.c, { icon: icons[z.t] }).addTo(map)
      .bindPopup(`<b>${roman} Zjazd (${z.d})</b><br>${z.p}<br><i>Organizator: ${z.b}</i><br><br><a href="${filename}">Otwórz relację</a>`);
  });

  // Drawer Logic
  const menuBtn = document.getElementById('menuBtn');
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('overlay');

  menuBtn.addEventListener('click', () => {
    drawer.classList.toggle('open');
    overlay.classList.toggle('active');
  });

  overlay.addEventListener('click', () => {
    drawer.classList.remove('open');
    overlay.classList.remove('active');
  });
</script>
</body>
</html>
