<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zjazdy Rodzinne | Klan L&K</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --cream: #f8f4ee; --parchment: #ede8df; --warm-white: #fdfaf6;
    --ink: #1e1a14; --gold: #9b7d4a; --gold-light: #c8a96e; --sepia: #7a6548;
    --c-zolty: #ffcc00; --c-czerwony: #cc0000; --c-zielony: #2d7a2d;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background-color: var(--warm-white); color: var(--ink); line-height: 1.6; }

  nav { background-color: var(--ink); position: sticky; top: 0; z-index: 1000; }
  .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 15px 24px; }
  .nav-logo { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); text-decoration: none; font-size: 1.2rem; letter-spacing: 2px; }
  .menu-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
  .menu-btn span { display: block; width: 25px; height: 1.5px; background: var(--gold-light); }

  .drawer { position: fixed; top: 0; right: -300px; width: 300px; height: 100vh; background: var(--ink); z-index: 1050; padding: 80px 30px; transition: 0.3s; }
  .drawer.open { right: 0; }
  .drawer-links { list-style: none; }
  .drawer-links li { margin-bottom: 20px; }
  .drawer-links a { color: var(--cream); text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1040; display: none; }
  .overlay.active { display: block; }

  main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
  .s-title { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; text-align: center; margin-bottom: 30px; }
  #map { height: 500px; width: 100%; border: 1px solid var(--sepia); margin-bottom: 20px; z-index: 1; background: #f0f0f0; }
  
  .legend { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 40px; font-size: 0.8rem; }
  .leg-item { display: flex; align-items: center; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); }

  .z-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
  .z-card { background: var(--cream); padding: 20px; border: 1px solid #ddd; text-decoration: none; color: inherit; transition: 0.2s; border-left: 5px solid #ccc; }
  .z-card:hover { background: var(--parchment); transform: translateY(-2px); }
  .z-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; margin-bottom: 5px; }
  .z-card .meta { font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

  .custom-pin { border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.3); }
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">ARCHIWUM L&K</a>
    <button class="menu-btn" id="menuBtn"><span></span><span></span><span></span></button>
  </div>
</nav>

<aside class="drawer" id="drawer">
  <ul class="drawer-links">
    <li><a href="index.html">Strona Główna</a></li>
    <li><a href="zjazdy.html">Zjazdy</a></li>
    <li><a href="genealogia.html">Genealogia</a></li>
    <li><a href="pamiec.html">Pamięć</a></li>
  </ul>
</aside>

<main>
  <h1 class="s-title">Kronika Zjazdów</h1>
  <div id="map"></div>
  <div class="legend">
    <div class="leg-item"><div class="dot" style="background:var(--c-zolty)"></div><span>Ładomirscy</span></div>
    <div class="leg-item"><div class="dot" style="background:var(--c-czerwony)"></div><span>Kraińscy</span></div>
    <div class="leg-item"><div class="dot" style="background:var(--c-zielony)"></div><span>Domańscy</span></div>
  </div>
  <div class="z-grid" id="z-container"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const zData = [
    { n: "I", p: "Modlin", d: "1975", c: [52.443, 20.690], g: "Ładomirscy" },
    { n: "II", p: "Szalejów Dolny", d: "1980", c: [50.435, 16.578], g: "Ładomirscy" },
    { n: "III", p: "Jankowice", d: "1983", c: [50.155, 18.423], g: "Ładomirscy" },
    { n: "IV", p: "Trzebieszowice", d: "1985", c: [50.347, 16.782], g: "Ładomirscy" },
    { n: "V", p: "Trzebieszowice", d: "1987", c: [50.347, 16.782], g: "Ładomirscy" },
    { n: "VI", p: "Łopuszna", d: "1989", c: [49.482, 20.130], g: "Kraińscy" },
    { n: "VII", p: "Piwniczna Zdrój", d: "1991", c: [49.435, 20.713], g: "Domańscy" },
    { n: "VIII", p: "Sorkwity", d: "1993", c: [53.839, 21.139], g: "Kraińscy" },
    { n: "IX", p: "Dziwnów", d: "1995", c: [54.021, 14.736], g: "Ładomirscy" },
    { n: "X", p: "Bąblin", d: "1997", c: [52.684, 16.772], g: "Ładomirscy" },
    { n: "XI", p: "Myczkowce", d: "1999", c: [49.426, 22.408], g: "Domańscy" },
    { n: "XII", p: "Jarnołtówek", d: "2001", c: [50.288, 17.442], g: "Ładomirscy" },
    { n: "XIII", p: "Stawiska", d: "2003", c: [54.041, 23.059], g: "Kraińscy" },
    { n: "XIV", p: "Wągrowiec", d: "2005", c: [52.807, 17.200], g: "Ładomirscy" },
    { n: "XV", p: "Bukowina Tatrzańska", d: "2007", c: [49.342, 20.106], g: "Kraińscy" },
    { n: "XVI", p: "Okuninka", d: "2009", c: [51.488, 23.535], g: "Domańscy" },
    { n: "XVII", p: "Krościenko", d: "2011", c: [49.439, 20.443], g: "Kraińscy" },
    { n: "XVIII", p: "Popowo-Letnisko", d: "2013", c: [52.540, 21.130], g: "Ładomirscy" },
    { n: "XIX", p: "Krynica Morska", d: "2015", c: [54.383, 19.444], g: "Kraińscy" },
    { n: "XX", p: "Boszkowo", d: "2017", c: [51.943, 16.324], g: "Ładomirscy" },
    { n: "XXI", p: "Międzybrodzie Żywieckie", d: "2019", c: [49.774, 19.221], g: "Kraińscy" },
    { n: "XXII", p: "Krzyże", d: "2022", c: [53.615, 21.579], g: "Kraińscy" },
    { n: "XXIII", p: "Borowice", d: "2024", c: [50.793, 15.694], g: "Ładomirscy" },
    { n: "XXIV", p: "Bocheniec", d: "2026", c: [50.817, 20.268], g: "Kraińscy" }
  ];

  const mapColors = { "Ładomirscy": "#ffcc00", "Kraińscy": "#cc0000", "Domańscy": "#2d7a2d" };

  const map = L.map('map').setView([52.1, 19.4], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const container = document.getElementById('z-container');
  zData.forEach((z, i) => {
    const color = mapColors[z.g];
    const icon = L.divIcon({
      className: 'custom-icon',
      html: `<div class="custom-pin" style="background:${color}; width:14px; height:14px;"></div>`,
      iconSize: [14, 14], iconAnchor: [7, 7]
    });

    L.marker(z.c, {icon}).addTo(map).bindPopup(`<b>${z.n} Zjazd: ${z.p}</b> (${z.d})<br>Gałąź: ${z.g}`);

    container.innerHTML += `
      <a href="zjazd${i+1}.html" class="z-card" style="border-left-color:${color}">
        <div class="meta" style="color:${color}">${z.d} | ${z.g}</div>
        <h3>${z.n} Zjazd: ${z.p}</h3>
      </a>`;
  });

  const btn = document.getElementById('menuBtn'), drw = document.getElementById('drawer'), ovr = document.getElementById('overlay');
  btn.onclick = () => { drw.classList.toggle('open'); ovr.classList.toggle('active'); };
  ovr.onclick = () => { drw.classList.remove('open'); ovr.classList.remove('active'); };
</script>
</body>
</html>
