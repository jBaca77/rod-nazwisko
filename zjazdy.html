<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kronika Zjazdów | Klan Ładomirskich i Kraińskich</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --cream: #f8f4ee;
    --parchment: #ede8df;
    --warm-white: #fdfaf6;
    --ink: #1e1a14;
    --ink-light: #3d3628;
    --sepia: #7a6548;
    --sepia-light: #b09a7e;
    --sepia-pale: #e8ddd0;
    --gold: #9b7d4a;
    --gold-light: #c8a96e;
    --line: rgba(122, 101, 72, 0.2);
    /* Kolory Gałęzi ze starej strony */
    --c-zolty: #ffcc00;
    --c-czerwony: #cc0000;
    --c-zielony: #2d7a2d;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Jost', sans-serif; 
    background-color: var(--warm-white); 
    color: var(--ink); 
    line-height: 1.7; 
    -webkit-font-smoothing: antialiased;
  }

  /* NAVIGATION - IDENTYCZNA JAK W INDEX.HTML */
  nav { background-color: var(--ink); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
  .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; }
  .nav-logo { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); text-decoration: none; font-size: 1.3rem; letter-spacing: 2px; font-weight: 400; }
  .menu-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 6px; padding: 5px; }
  .menu-btn span { display: block; width: 28px; height: 1px; background: var(--gold-light); transition: 0.3s; }

  /* DRAWER */
  .drawer { position: fixed; top: 0; right: -320px; width: 320px; height: 100vh; background: var(--ink); z-index: 1050; padding: 100px 40px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  .drawer.open { right: 0; }
  .drawer-links { list-style: none; }
  .drawer-links li { margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }
  .drawer-links a { color: var(--cream); text-decoration: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); z-index: 1040; display: none; }
  .overlay.active { display: block; }

  /* HEADER SEKCJI */
  main { max-width: 1100px; margin: 0 auto; padding: 60px 24px; }
  .s-label { font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--sepia-light); text-align: center; display: block; margin-bottom: 15px; }
  .s-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.2rem); text-align: center; margin-bottom: 50px; font-weight: 400; }

  /* MAPA - STYLIZACJA RETRO */
  #map { 
    height: 550px; width: 100%; border: 1px solid var(--sepia-pale); 
    margin-bottom: 25px; z-index: 1; border-radius: 2px;
    filter: sepia(15%) contrast(95%) brightness(98%);
  }
  
  .legend { 
    display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; 
    margin-bottom: 60px; padding: 20px; background: var(--cream); 
    border: 1px solid var(--line); border-radius: 4px;
  }
  .leg-item { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; color: var(--sepia); }
  .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }

  /* GRID KART */
  .z-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
  .z-card { 
    background: var(--cream); padding: 35px; border: 1px solid var(--line); 
    text-decoration: none; color: inherit; transition: all 0.4s ease; 
    display: flex; flex-direction: column; position: relative; overflow: hidden;
  }
  .z-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: #ccc; }
  .z-card:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(122, 101, 72, 0.1); }
  
  .z-card .meta { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
  .z-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; margin-bottom: 10px; line-height: 1.2; font-weight: 500; }
  .z-card .place { font-size: 0.9rem; color: var(--ink-light); font-style: italic; }

  /* LEAFLET POPUP STYLING */
  .leaflet-popup-content-wrapper { background: var(--cream); font-family: 'Jost', sans-serif; border-radius: 2px; color: var(--ink); }
  .leaflet-popup-tip { background: var(--cream); }
  .custom-pin { border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

  footer { background: var(--ink); color: rgba(248,244,238,0.4); text-align: center; padding: 80px 24px; font-size: 0.8rem; margin-top: 100px; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">ARCHIWUM RODZINNE</a>
    <button class="menu-btn" id="menuBtn"><span></span><span></span><span></span></button>
  </div>
</nav>

<aside class="drawer" id="drawer">
  <ul class="drawer-links">
    <li><a href="index.html">Strona Główna</a></li>
    <li><a href="zjazdy.html" style="color:var(--gold-light)">Zjazdy Rodzinne</a></li>
    <li><a href="genealogia.html">Genealogia</a></li>
    <li><a href="pamiec.html">Pamięć</a></li>
  </ul>
</aside>

<main>
  <span class="s-label">Pół wieku tradycji</span>
  <h1 class="s-title">Kronika Zjazdów Rodzinnych</h1>
  
  <div id="map"></div>
  
  <div class="legend">
    <div class="leg-item"><div class="dot" style="background:var(--c-zolty)"></div><span>Ładomirscy</span></div>
    <div class="leg-item"><div class="dot" style="background:var(--c-czerwony)"></div><span>Kraińscy</span></div>
    <div class="leg-item"><div class="dot" style="background:var(--c-zielony)"></div><span>Domańscy</span></div>
  </div>

  <div class="z-grid" id="z-container"></div>
</main>

<footer>
  <p>KLAN ŁADOMIRSKICH I KRAIŃSKICH © 1975 – 2026</p>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const zData = [
    { n: "I", p: "Modlin", d: "1975", c: [52.443, 20.690], g: "Ładomirscy" },
    { n: "II", p: "Szalejów Dolny", d: "1980", c: [50.435, 16.578], g: "Ładomirscy" },
    { n: "III", p: "Jankowice", d: "1983", c: [50.155, 18.423], g: "Ładomirscy" },
    { n: "IV", p: "Trzebieszowice", d: "1985", c: [50.347, 16.782], g: "Ładomirscy" },
    { n: "V", p: "Trzebieszowice", d: "1987", c: [50.347, 16.782], g: "Ładomirscy" },
    { n: "VI", p: "Łopuszna", d: "1989", c: [49.482, 20.130], g: "Kraińscy" },
    { n: "VII", p: "Piwniczna Zdrój", d: "1991", c: [49.435, 20.713], g: "Domańscy" },
    { n: "VIII", p: "Sorkwity", d: "1993", c: [53.839, 21.139], g: "Kraińscy" },
    { n: "IX", p: "Dziwnów", d: "1995", c: [54.021, 14.736], g: "Ładomirscy" },
    { n: "X", p: "Bąblin", d: "1997", c: [52.684, 16.772], g: "Ładomirscy" },
    { n: "XI", p: "Myczkowce", d: "1999", c: [49.426, 22.408], g: "Domańscy" },
    { n: "XII", p: "Jarnołtówek", d: "2001", c: [50.288, 17.442], g: "Ładomirscy" },
    { n: "XIII", p: "Stawiska", d: "2003", c: [54.041, 23.059], g: "Kraińscy" },
    { n: "XIV", p: "Wągrowiec", d: "2005", c: [52.807, 17.200], g: "Ładomirscy" },
    { n: "XV", p: "Bukowina Tatrzańska", d: "2007", c: [49.342, 20.106], g: "Kraińscy" },
    { n: "XVI", p: "Okuninka", d: "2009", c: [51.488, 23.535], g: "Domańscy" },
    { n: "XVII", p: "Krościenko", d: "2011", c: [49.439, 20.443], g: "Kraińscy" },
    { n: "XVIII", p: "Popowo-Letnisko", d: "2013", c: [52.540, 21.130], g: "Ładomirscy" },
    { n: "XIX", p: "Krynica Morska", d: "2015", c: [54.383, 19.444], g: "Kraińscy" },
    { n: "XX", p: "Boszkowo", d: "2017", c: [51.943, 16.324], g: "Ładomirscy" },
    { n: "XXI", p: "Międzybrodzie Żywieckie", d: "2019", c: [49.774, 19.221], g: "Kraińscy" },
    { n: "XXII", p: "Krzyże", d: "2022", c: [53.615, 21.579], g: "Kraińscy" },
    { n: "XXIII", p: "Borowice", d: "2024", c: [50.793, 15.694], g: "Ładomirscy" },
    { n: "XXIV", p: "Bocheniec", d: "2026", c: [50.817, 20.268], g: "Kraińscy" }
  ];

  const mapColors = { "Ładomirscy": "#ffcc00", "Kraińscy": "#cc0000", "Domańscy": "#2d7a2d" };

  // MAPA
  const map = L.map('map', { scrollWheelZoom: false }).setView([52.1, 19.4], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const container = document.getElementById('z-container');
  zData.forEach((z, i) => {
    const color = mapColors[z.g];
    const icon = L.divIcon({
      className: 'custom-icon',
      html: `<div class="custom-pin" style="background:${color}; width:16px; height:16px;"></div>`,
      iconSize: [16, 16], iconAnchor: [8, 8]
    });

    L.marker(z.c, {icon}).addTo(map)
      .bindPopup(`<div style="padding:5px"><b>${z.n} Zjazd Rodzinny</b><br>${z.p}, ${z.d}<br><br><a href="zjazd${i+1}.html" style="color:var(--gold); text-decoration:none; font-weight:600; font-size:11px; text-transform:uppercase;">Otwórz Archiwum →</a></div>`);

    container.innerHTML += `
      <a href="zjazd${i+1}.html" class="z-card" style="border-left-color:${color}">
        <div class="meta" style="color:${color}">${z.d} — ${z.g}</div>
        <h3>${z.n} Zjazd Rodzinny</h3>
        <div class="place">${z.p}</div>
      </a>`;
  });

  // MENU DRAWER
  const btn = document.getElementById('menuBtn'), drw = document.getElementById('drawer'), ovr = document.getElementById('overlay');
  btn.onclick = () => { drw.classList.add('open'); ovr.classList.add('active'); };
  ovr.onclick = () => { drw.classList.remove('open'); ovr.classList.remove('active'); };
</script>
</body>
</html>
