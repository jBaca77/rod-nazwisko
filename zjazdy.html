<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // t: 1-Ładomirscy (Złoty), 2-Kraińscy (Czerwony), 3-Domańscy (Zielony)
  const zData = [
    { n: "I", p: "Modlin i Buraków-Wrzosów", d: "1975", c: [52.443, 20.690], t: 1, g: "Ładomirscy" },
    { n: "II", p: "Szalejów Dolny", d: "1980", c: [50.435, 16.578], t: 2, g: "Kraińscy" },
    { n: "III", p: "Jankowice", d: "1983", c: [50.155, 18.423], t: 3, g: "Domańscy" },
    { n: "IV", p: "Trzebieszowice", d: "1985", c: [50.347, 16.782], t: 1, g: "Ładomirscy" },
    { n: "V", p: "Trzebieszowice", d: "1987", c: [50.347, 16.782], t: 1, g: "Ładomirscy" },
    { n: "VI", p: "Łopuszna", d: "1989", c: [49.482, 20.130], t: 3, g: "Domańscy" },
    { n: "VII", p: "Piwniczna Zdrój", d: "1991", c: [49.435, 20.713], t: 3, g: "Domańscy" },
    { n: "VIII", p: "Sorkwity", d: "1993", c: [53.839, 21.139], t: 3, g: "Domańscy" },
    { n: "IX", p: "Dziwnów", d: "1995", c: [54.021, 14.736], t: 3, g: "Domańscy" },
    { n: "X", p: "Bąblin", d: "1997", c: [52.684, 16.772], t: 3, g: "Domańscy" },
    { n: "XI", p: "Myczkowce", d: "1999", c: [49.426, 22.408], t: 3, g: "Domańscy" },
    { n: "XII", p: "Jarnołtówek", d: "2001", c: [50.288, 17.442], t: 3, g: "Domańscy" },
    { n: "XIII", p: "Stawiska", d: "2003", c: [54.041, 23.059], t: 3, g: "Domańscy" },
    { n: "XIV", p: "Wągrowiec", d: "2005", c: [52.807, 17.200], t: 3, g: "Domańscy" },
    { n: "XV", p: "Bukowina Tatrzańska", d: "2007", c: [49.342, 20.106], t: 3, g: "Domańscy" },
    { n: "XVI", p: "Okuninka", d: "2009", c: [51.488, 23.535], t: 3, g: "Domańscy" },
    { n: "XVII", p: "Krościenko", d: "2011", c: [49.439, 20.443], t: 3, g: "Domańscy" },
    { n: "XVIII", p: "Popowo - Letnisko", d: "2013", c: [52.540, 21.130], t: 3, g: "Domańscy" },
    { n: "XIX", p: "Krynica Morska", d: "2015", c: [54.383, 19.444], t: 3, g: "Domańscy" },
    { n: "XX", p: "Boszkowo", d: "2017", c: [51.943, 16.324], t: 3, g: "Domańscy" },
    { n: "XXI", p: "Międzybrodzie Żywieckie", d: "2019", c: [49.774, 19.221], t: 3, g: "Domańscy" },
    { n: "XXII", p: "Krzyże", d: "2022", c: [53.615, 21.579], t: 3, g: "Domańscy" },
    { n: "XXIII", p: "Borowice", d: "2024", c: [50.793, 15.694], t: 3, g: "Domańscy" },
    { n: "XXIV", p: "Bocheniec", d: "2026", c: [50.817, 20.268], t: 3, g: "Domańscy" }
  ];

  const colors = { 1: "#e6b422", 2: "#b32d2e", 3: "#2d7a2d" };

  // 1. Inicjalizacja Mapy
  const map = L.map('map', {
    scrollWheelZoom: false // Opcjonalnie: wyłącza zoom scrollem, żeby łatwiej było przewijać stronę
  }).setView([52.0, 19.0], 6);
  
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  // 2. DODANIE POGRUBIONYCH GRANIC POLSKI
  // Pobieramy dane GeoJSON granic Polski (publiczne repozytorium)
  fetch('https://raw.githubusercontent.com/PiotrZSL/granice-polski/master/granice_panstwa.geojson')
    .then(response => response.json())
    .then(data => {
      L.geoJSON(data, {
        style: {
          color: "#7a6548", // Kolor sepii/brązu pasujący do Archiwum
          weight: 4,        // Grubość linii
          opacity: 0.6,     // Przezroczystość
          fillOpacity: 0    // Brak wypełnienia środka
        }
      }).addTo(map);
    });

  // 3. Generowanie Pinezek i Kart
  const container = document.getElementById('z-container');

  zData.forEach((z, i) => {
    const filename = `zjazd${i + 1}.html`;
    
    const icon = L.divIcon({
      className: 'custom-div-icon',
      html: `<div class="custom-pin" style="background:${colors[z.t]}; width:14px; height:14px;"></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });

    L.marker(z.c, { icon }).addTo(map)
      .bindPopup(`<b>${z.n} Zjazd: ${z.p}</b><br>Rok: ${z.d}<br>Gałąź: ${z.g}<br><br><a href="${filename}">Otwórz relację</a>`);

    container.innerHTML += `
      <a href="${filename}" class="z-card">
        <div>
          <div class="num">${z.n} ZJAZD</div>
          <div class="year" style="color:${colors[z.t]}">${z.d}</div>
          <h3>${z.p}</h3>
        </div>
        <div class="branch-tag" style="color:${colors[z.t]}">Gałąź: ${z.g}</div>
      </a>
    `;
  });

  // Drawer
  const btn = document.getElementById('menuBtn');
  const drw = document.getElementById('drawer');
  const ovr = document.getElementById('overlay');
  btn.onclick = () => { drw.classList.toggle('open'); ovr.classList.toggle('active'); };
  ovr.onclick = () => { drw.classList.remove('open'); ovr.classList.remove('active'); };
</script>
