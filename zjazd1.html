<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Archiwum L&K</title>
    <style>
        :root {
            --gold: #c5a059;
            --gold-light: #e2c792;
            --dark: #1e1a14;
            --bg: #fdfaf6;
        }

        body {
            font-family: 'Jost', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--dark);
        }

        /* Siatka galerii */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            aspect-ratio: 3/2;
            overflow: hidden;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.02);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- LIGHTBOX (Nakładka) --- */
        #lightbox {
            display: none; 
            position: fixed; 
            z-index: 2000; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.95); 
            justify-content: center; 
            align-items: center;
            user-select: none;
            touch-action: none; /* Ważne dla gestów swipe */
        }

        .lb-content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            height: 90%;
            justify-content: center;
        }

        #lb-img {
            max-width: 100%;
            max-height: 80vh;
            border: 4px solid white;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            object-fit: contain;
            cursor: pointer;
        }

        /* Przyciski nawigacyjne */
        .lb-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.15);
            color: white;
            border: none;
            font-size: 3rem;
            width: 70px;
            height: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 2100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lb-nav-btn:hover {
            background: rgba(255,255,255,0.3);
            color: var(--gold-light);
        }

        .lb-prev { left: 0; border-radius: 0 10px 10px 0; }
        .lb-next { right: 0; border-radius: 10px 0 0 10px; }

        .lb-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 3.5rem;
            cursor: pointer;
            z-index: 2200;
            line-height: 1;
        }

        .lb-counter {
            color: white;
            margin-top: 20px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.6);
            padding: 6px 18px;
            border-radius: 20px;
        }

        @media (max-width: 768px) {
            .lb-nav-btn { width: 50px; height: 70px; font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="gallery-grid" id="gallery-container">
        </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="lb-close" onclick="closeLightbox()">&times;</span>
        
        <button class="lb-nav-btn lb-prev" onclick="event.stopPropagation(); changePhoto(-1)">❮</button>
        
        <div class="lb-content">
            <img id="lb-img" src="" alt="Powiększenie" onclick="event.stopPropagation(); changePhoto(1)">
            <div class="lb-counter" id="lb-counter"></div>
        </div>
        
        <button class="lb-nav-btn lb-next" onclick="event.stopPropagation(); changePhoto(1)">❯</button>
    </div>

    <script>
        // --- KONFIGURACJA ---
        const zjazd_folder = 'zjazdi'; // nazwa podfolderu
        const liczba_zdjec = 38;       // liczba plików w folderze
        let currentPhotoIndex = 1;

        const container = document.getElementById('gallery-container');
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const lbCounter = document.getElementById('lb-counter');

        // 1. Generowanie miniatur
        for (let i = 1; i <= liczba_zdjec; i++) {
            const numerFoto = i.toString().padStart(2, '0');
            const fullSrc = `img/zjazdy/${zjazd_folder}/foto_${zjazd_folder}_${numerFoto}.jpg`;

            const wrapper = document.createElement('div');
            wrapper.className = 'gallery-item';
            
            const img = document.createElement('img');
            img.src = fullSrc;
            img.alt = `Zdjęcie ${i}`;
            img.loading = "lazy";
            
            wrapper.onclick = () => openLightbox(i);
            wrapper.appendChild(img);
            container.appendChild(wrapper);
        }

        // 2. Obsługa Lightboxa
        function openLightbox(index) {
            currentPhotoIndex = index;
            updateLightboxContent();
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // blokada przewijania strony
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function changePhoto(direction) {
            currentPhotoIndex += direction;
            if (currentPhotoIndex > liczba_zdjec) currentPhotoIndex = 1;
            if (currentPhotoIndex < 1) currentPhotoIndex = liczba_zdjec;
            updateLightboxContent();
        }

        function updateLightboxContent() {
            const numerFoto = currentPhotoIndex.toString().padStart(2, '0');
            lbImg.src = `img/zjazdy/${zjazd_folder}/foto_${zjazd_folder}_${numerFoto}.jpg`;
            lbCounter.textContent = `${currentPhotoIndex} / ${liczba_zdjec}`;
        }

        // 3. Sterowanie klawiaturą
        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === "ArrowRight") changePhoto(1);
                if (e.key === "ArrowLeft") changePhoto(-1);
                if (e.key === "Escape") closeLightbox();
            }
        });

        // 4. Obsługa gestów swipe na telefonach
        let touchStartX = 0;
        lightbox.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        lightbox.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            let diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > 50) { // próg czułości
                if (diff > 0) changePhoto(1);  // przesunięcie w lewo -> następne
                else changePhoto(-1);          // przesunięcie w prawo -> poprzednie
            }
        }, {passive: true});
    </script>

</body>
</html>
