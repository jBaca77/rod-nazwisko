<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamięć | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cream: #f8f4ee;
            --parchment: #ede8df;
            --warm-white: #fdfaf6;
            --ink: #1e1a14;
            --sepia: #7a6548;
            --gold: #9b7d4a;
            --gold-light: #c8a96e;
            --green-dark: #2c3e2d;
            --pline: rgba(122, 101, 72, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Jost', sans-serif; 
            background-color: var(--warm-white); 
            color: var(--ink); 
            line-height: 1.7; 
            -webkit-font-smoothing: antialiased; 
        }

        /* NAV */
        nav { 
            background-color: var(--ink); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 2px 20px rgba(0,0,0,0.1); 
        }
        .nav-inner { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 16px 24px; 
        }
        .nav-logo { 
            font-family: 'Cormorant Garamond', serif; 
            color: var(--gold-light); 
            text-decoration: none; 
            font-size: 1.2rem; 
            letter-spacing: 2px; 
        }

        /* HEADER */
        .hero-header { 
            background-color: var(--green-dark); 
            padding: 100px 24px 80px; 
            text-align: center; 
            position: relative; 
            overflow: hidden; 
            color: var(--cream);
        }
        .hero-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255, 255, 255, 0.025) 1px);
            pointer-events: none;
        }

        .s-label { 
            font-size: 0.7rem; 
            letter-spacing: 0.35em; 
            text-transform: uppercase; 
            color: var(--gold-light); 
            display: block; 
            margin-bottom: 20px; 
        }
        .hero-header h1 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: clamp(2.6rem, 6vw, 4.2rem); 
            font-weight: 300; 
            margin-bottom: 30px;
        }

        /* GRID */
        main { 
            max-width: 1100px; 
            margin: -40px auto 80px; 
            padding: 0 24px; 
            position: relative; 
            z-index: 10; 
        }
        .z-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); 
            gap: 40px; 
        }
        
        .z-card { 
            position: relative; 
            background: var(--cream); 
            padding: 60px 40px; 
            text-decoration: none; 
            color: var(--ink);
            border: 1px solid var(--parchment); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            aspect-ratio: 1 / 1; /* Wymuszenie kształtu kwadratu */
        }

        .z-card::after { 
            content: ""; 
            position: absolute; 
            inset: 12px; 
            border: 1px solid var(--pline); 
            pointer-events: none; 
        }

        .z-card:hover { 
            transform: translateY(-5px); 
            background: white;
            border-color: var(--gold-light); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
        }

        .card-icon { color: var(--gold); margin-bottom: 25px; }
        
        .z-card h2 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 2rem; 
            font-weight: 400; 
            margin-bottom: 15px; 
        }
        .z-card p { 
            font-size: 0.95rem; 
            color: var(--sepia); 
            font-style: italic; 
        }

        footer { 
            background: var(--ink); 
            color: rgba(248, 244, 238, 0.4); 
            text-align: center; 
            padding: 60px 24px; 
            font-size: 0.75rem; 
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">ARCHIWUM L&K</a>
    </div>
</nav>

<header class="hero-header">
    <span class="s-label">Księga Pamięci</span>
    <h1>Pamięć i Historia</h1>
</header>

<main>
    <div class="z-grid">
        <a href="miejsca-pochowku-O.html" class="z-card">
            <div class="card-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <path d="M12 22V8M5 12H19M12 2L12 8M9 22H15"/>
                </svg>
            </div>
            <h2>Miejsca Spoczynku</h2>
            <p>Mapa i spis miejsc wiecznego spoczynku.</p>
        </a>

        <a href="wspomnienie-zmarly5.html" class="z-card">
            <div class="card-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
            </div>
            <h2>Wspomnienia</h2>
            <p>Biografie i archiwalne świadectwa o przodkach.</p>
        </a>
    </div>
</main>

<footer>
    <p>KLAN ŁADOMIRSKICH I KRAIŃSKICH © 1975 – 2026</p>
</footer>

</body>
</html>
