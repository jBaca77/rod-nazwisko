<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geografia Rodowa | Archiwum L&K</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm-white: #fdfaf6; --ink: #1e1a14; --sepia: #7a6548; --gold: #9b7d4a;
            --gold-light: #c8a96e; --line: rgba(122, 101, 72, 0.2);
            /* Kolory klanowe ze zdjęcia */
            --c-ladomirscy: #fcc000; 
            --c-krainscy: #cc0000; 
            --c-domanscy: #2d7a2d;
            --c-golebscy: #7a6548;
            --c-fedorowicz: #444444;
            --c-bg: #f8f4ee;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Jost', sans-serif; background-color: var(--warm-white); color: var(--ink); line-height: 1.6; }

        /* HEADER */
        header { background-color: #2c3e2d; color: #f8f4ee; text-align: center; padding: 60px 20px; }
        .header-ornament { font-family: 'Cormorant Garamond', serif; font-size: 12px; letter-spacing: .3em; text-transform: uppercase; color: var(--gold-light); display: block; margin-bottom: 10px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 300; }

        /* MAPA */
        .map-container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        #map { height: 500px; width: 100%; border: 1px solid var(--line); border-radius: 2px; background: #f0ede5; }

        /* 8 DWUKOLOROWYCH PRZYCISKÓW */
        .filter-bar { 
            max-width: 1100px; margin: 20px auto; 
            display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; padding: 15px; 
        }
        .filter-item { 
            cursor: pointer; display: flex; align-items: center; gap: 8px; 
            padding: 8px 14px; border: 1px solid var(--line); background: white;
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .filter-item:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .filter-item.active { border-color: var(--ink); background: #f0f0f0; font-weight: 500; }

        /* Kropka dwukolorowa - wg zdjęcia */
        .dual-dot { 
            width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.15);
            background: linear-gradient(135deg, var(--c1) 50%, var(--c2) 50%);
        }

        /* GRID BOXÓW */
        .geo-grid { 
            max-width: 1100px; margin: 40px auto; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; padding: 0 20px;
        }
        .geo-box { 
            background: white; border: 1px solid var(--line); padding: 15px; 
            display: flex; flex-direction: column; gap: 10px; transition: 0.3s;
        }
        .box-header { display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 0.85rem; }
        .btn-locate { font-size: 0.65rem; color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: 600; }
        
        footer { background: var(--ink); color: rgba(255,255,255,0.3); text-align: center; padding: 40px; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <span class="header-ornament">Słownik Miejscowości</span>
    <h1>Geografia Rodowa</h1>
</header>

<div class="map-container">
    <div id="map"></div>
</div>

<div class="filter-bar">
    <div class="filter-item active" onclick="filterMap('all', this)">
        <div class="dual-dot" style="--c1: #333; --c2: #eee"></div><span>Wszystkie</span>
    </div>
    <div class="filter-item" onclick="filterMap('L', this)">
        <div class="dual-dot" style="--c1: var(--c-ladomirscy); --c2: #fff"></div><span>Ładomirscy</span>
    </div>
    <div class="filter-item" onclick="filterMap('K', this)">
        <div class="dual-dot" style="--c1: var(--c-krainscy); --c2: #fff"></div><span>Kraińscy</span>
    </div>
    <div class="filter-item" onclick="filterMap('D', this)">
        <div class="dual-dot" style="--c1: var(--c-domanscy); --c2: #fff"></div><span>Domańscy</span>
    </div>
    <div class="filter-item" onclick="filterMap('LK', this)">
        <div class="dual-dot" style="--c1: var(--c-ladomirscy); --c2: var(--c-krainscy)"></div><span>L & K</span>
    </div>
    <div class="filter-item" onclick="filterMap('G', this)">
        <div class="dual-dot" style="--c1: var(--c-golebscy); --c2: #fff"></div><span>Gołębscy</span>
    </div>
    <div class="filter-item" onclick="filterMap('F', this)">
        <div class="dual-dot" style="--c1: var(--c-fedorowicz); --c2: #fff"></div><span>Fedorowicz</span>
    </div>
    <div class="filter-item" onclick="filterMap('MIX', this)">
        <div class="dual-dot" style="--c1: var(--c-domanscy); --c2: var(--c-golebscy)"></div><span>Inne Linie</span>
    </div>
</div>

<div class="geo-grid" id="geoGrid"></div>

<footer>KLAN ŁADOMIRSKICH I KRAIŃSKICH © 2026</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Dane punktów
    const locations = [
        { id: 1, n: "Biejków", cat: "L", c: [51.68, 20.93], color: "#fcc000" },
        { id: 2, n: "Babin", cat: "K", c: [49.88, 24.35], color: "#cc0000" },
        { id: 3, n: "Rożnów", cat: "D", c: [49.77, 20.68], color: "#2d7a2d" },
        { id: 4, n: "Lwów", cat: "LK", c: [49.83, 24.02], color: "#fcc000" }
    ];

    const map = L.map('map', { scrollWheelZoom: false }).setView([51.5, 21.0], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    const markerMap = {};

    function init() {
        const grid = document.getElementById('geoGrid');
        locations.forEach(loc => {
            // ZMNIEJSZONE KROPKI: radius zmieniony na 5
            const marker = L.circleMarker(loc.c, {
                radius: 5, 
                fillColor: loc.color,
                color: "#fff",
                weight: 1.5,
                opacity: 1,
                fillOpacity: 1
            }).addTo(map).bindPopup(`<strong>${loc.n}</strong>`);
            
            marker.category = loc.cat;
            markerMap[loc.id] = marker;

            grid.innerHTML += `
                <div class="geo-box" data-cat="${loc.cat}">
                    <div class="box-header">
                        <div class="dual-dot" style="--c1: ${loc.color}; --c2: #fff; width:12px; height:12px;"></div>
                        <span>${loc.n}</span>
                    </div>
                    <span class="btn-locate" onclick="highlightMarker(${loc.id})">Namierz na mapie</span>
                </div>
            `;
        });
    }

    function highlightMarker(id) {
        const marker = markerMap[id];
        if (!marker) return;

        // Skok do mapy
        document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        marker.openPopup();
        let cnt = 0;
        const pulse = setInterval(() => {
            marker.setRadius(cnt % 2 === 0 ? 12 : 5);
            cnt++;
            if (cnt > 5) { clearInterval(pulse); marker.setRadius(5); }
        }, 200);
    }

    function filterMap(cat, element) {
        document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        Object.values(markerMap).forEach(m => {
            if (cat === 'all' || m.category === cat) {
                map.addLayer(m);
            } else {
                map.removeLayer(m);
            }
        });

        document.querySelectorAll('.geo-box').forEach(box => {
            box.style.display = (cat === 'all' || box.dataset.cat === cat) ? 'flex' : 'none';
        });
    }

    init();
</script>
</body>
</html>
