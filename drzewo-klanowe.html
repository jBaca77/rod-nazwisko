<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drzewo Klanowe | Archiwum L&K</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>

    <style>
        :root {
            --cream: #f8f4ee; --warm-white: #fdfaf6; --ink: #1e1a14;
            --gold: #9b7d4a; --gold-light: #c8a96e; --sepia: #7a6548;
            --sepia-pale: #e8ddd0;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Jost', sans-serif; background-color: var(--warm-white); color: var(--ink); overflow: hidden; touch-action: none; }

        /* ── NAV ── */
        nav { background-color: var(--ink); height: 60px; display: flex; align-items: center; z-index: 1000; position: relative; }
        .nav-inner { width: 100%; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; padding: 0 20px; }
        .nav-logo { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); text-decoration: none; font-size: 1.1rem; letter-spacing: 2px; }
        .nav-back { color: var(--gold-light); text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }

        /* ── VIEWER CONTAINER ── */
        #viewer-container {
            width: 100vw;
            height: calc(100vh - 120px); /* Odliczamy nav i footer */
            background: var(--cream);
            overflow: hidden;
            position: relative;
            cursor: grab;
        }
        #viewer-container:active { cursor: grabbing; }

        /* Canvas z PDF */
        #pdf-canvas {
            display: block;
            transform-origin: 0 0;
        }

        /* ── CONTROLS ── */
        .controls {
            position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100;
        }
        .btn-zoom {
            width: 50px; height: 50px; background: var(--ink); color: var(--gold-light); border: none; border-radius: 50%; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* ── FOOTER ── */
        footer { height: 60px; background: var(--warm-white); display: flex; align-items: center; justify-content: center; border-top: 1px solid var(--sepia-pale); }
        .btn-download { color: var(--ink); text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; border: 1px solid var(--ink); padding: 8px 15px; transition: 0.3s; }
        .btn-download:hover { background: var(--ink); color: var(--gold-light); }

        #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--sepia); font-style: italic; }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">ARCHIWUM L&K</a>
        <a href="genealogia.html" class="nav-back">Wstecz</a>
    </div>
</nav>

<div id="viewer-container">
    <div id="status">Wczytywanie dokumentu PDF...</div>
    <div id="panzoom-element">
        <canvas id="pdf-canvas"></canvas>
    </div>
    
    <div class="controls">
        <button class="btn-zoom" id="zin">+</button>
        <button class="btn-zoom" id="zout">−</button>
    </div>
</div>

<footer>
    <a href="img/Dokumenty/drzewo_kol_20_08_2024.pdf" download class="btn-download">Pobierz PDF do druku</a>
</footer>

<script>
    const url = 'img/Dokumenty/drzewo_kol_20_08_2024.pdf';
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const elem = document.getElementById('panzoom-element');

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    async function initPDF() {
        try {
            const pdf = await pdfjsLib.getDocument(url).promise;
            const page = await pdf.getPage(1);

            // KLUCZ: Wysoki współczynnik skali (4.0) gwarantuje ostrość przy dużym zoomie
            const viewport = page.getViewport({ scale: 4.0 });
            
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            status.style.display = 'none';

            // Inicjalizacja Panzoom (Gesty + Mysz)
            const panzoom = Panzoom(elem, {
                maxScale: 10,
                minScale: 0.05,
                contain: 'outside',
                startScale: 0.2 // Startowy widok oddalony
            });

            // Obsługa kółka myszy
            document.getElementById('viewer-container').addEventListener('wheel', panzoom.zoomWithWheel);

            // Obsługa przycisków
            document.getElementById('zin').addEventListener('click', panzoom.zoomIn);
            document.getElementById('zout').addEventListener('click', panzoom.zoomOut);

            // Centrowanie na starcie
            setTimeout(() => {
                panzoom.pan(0, 0);
            }, 100);

        } catch (e) {
            status.innerText = "Błąd ładowania pliku PDF. Sprawdź ścieżkę.";
            console.error(e);
        }
    }

    initPDF();
</script>

</body>
</html>
