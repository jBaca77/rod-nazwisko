<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10.0, user-scalable=yes">
    <title>Drzewo Klanowe | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cream: #f8f4ee; --warm-white: #fdfaf6; --ink: #1e1a14;
            --gold: #9b7d4a; --gold-light: #c8a96e; --sepia: #7a6548;
            --sepia-pale: #e8ddd0;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Jost', sans-serif; background-color: var(--warm-white); color: var(--ink); -webkit-overflow-scrolling: touch; }

        /* ── NAV ── */
        nav { background-color: var(--ink); position: sticky; top: 0; z-index: 1000; }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; }
        .nav-logo { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); text-decoration: none; font-size: 1.2rem; letter-spacing: 2px; }
        .nav-back-link { display: flex; align-items: center; gap: 10px; color: var(--gold-light); text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; border-left: 1px solid rgba(200, 169, 110, 0.3); padding-left: 20px; }

        /* ── CONTENT ── */
        main { max-width: 1200px; margin: 0 auto; padding: 30px 20px; text-align: center; }
        .intro-section h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 300; margin-bottom: 15px; }
        .s-line { width: 60px; height: 1px; background: var(--gold-light); margin: 20px auto; opacity: 0.6; }

        /* ── TREE CONTAINER ── */
        .tree-container {
            width: 100%;
            height: 75vh;
            background: var(--cream);
            border: 1px solid var(--sepia-pale);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            cursor: grab;
            touch-action: none; /* Wyłączamy domyślne akcje dla JS Drag */
        }
        .tree-container:active { cursor: grabbing; }

        /* Iframe z PDF */
        #tree-wrapper {
            width: 200%; /* Większy obszar roboczy dla przesuwania */
            height: 200%;
            position: absolute;
            top: -50%;
            left: -50%;
            transition: transform 0.1s ease-out;
            pointer-events: all;
        }

        .tree-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ── ACTION ── */
        .action-area { margin: 30px 0 50px; }
        .btn-download { display: inline-flex; align-items: center; padding: 14px 28px; background: var(--ink); color: var(--gold-light); text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-download:hover { background: var(--gold); color: white; }

        footer { text-align: center; color: rgba(0,0,0,0.3); font-size: 0.75rem; padding-bottom: 40px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">ARCHIWUM L&K</a>
        <a href="genealogia.html" class="nav-back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Wstecz
        </a>
    </div>
</nav>

<main>
    <section class="intro-section">
        <h1>Drzewo Klanowe</h1>
        <p style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--sepia); margin-top: 5px;">
            Jasne, że jest to drzewo klanowe.
        </p>
        <div class="s-line"></div>
    </section>
    
    <div class="tree-container" id="drag-container">
        <div id="tree-wrapper">
            <iframe 
                class="tree-iframe" 
                src="https://docs.google.com/viewer?url=https://github.com/jBaca77/rod-nazwisko/raw/main/img/Dokumenty/drzewo_kol_20_08_2024.pdf&embedded=true">
            </iframe>
        </div>
    </div>

    <div class="action-area">
        <a href="./img/Dokumenty/drzewo_kol_20_08_2024.pdf" download class="btn-download">
            Pobierz PDF
        </a>
    </div>
</main>

<footer>
    <p>KLAN ŁADOMIRSKICH I KRAIŃSKICH © 1975 – 2026</p>
</footer>

<script>
    const container = document.getElementById('drag-container');
    const wrapper = document.getElementById('tree-wrapper');

    let isDragging = false;
    let startX, startY;
    let scrollLeft, scrollTop;

    // Funkcja rozpoczynająca przeciąganie
    const startDragging = (e) => {
        isDragging = true;
        container.style.cursor = 'grabbing';
        
        // Obsługa myszy i dotyku
        const pageX = e.pageX || e.touches[0].pageX;
        const pageY = e.pageY || e.touches[0].pageY;
        
        startX = pageX - wrapper.offsetLeft;
        startY = pageY - wrapper.offsetTop;
    };

    // Funkcja kończąca przeciąganie
    const stopDragging = () => {
        isDragging = false;
        container.style.cursor = 'grab';
    };

    // Funkcja ruchu
    const move = (e) => {
        if (!isDragging) return;
        e.preventDefault();

        const pageX = e.pageX || (e.touches ? e.touches[0].pageX : null);
        const pageY = e.pageY || (e.touches ? e.touches[0].pageY : null);

        if (pageX === null || pageY === null) return;

        const x = pageX - startX;
        const y = pageY - startY;
        
        wrapper.style.left = `${x}px`;
        wrapper.style.top = `${y}px`;
    };

    // Event Listenery dla myszy
    container.addEventListener('mousedown', startDragging);
    window.addEventListener('mouseup', stopDragging);
    window.addEventListener('mousemove', move);

    // Event Listenery dla dotyku (mobile)
    container.addEventListener('touchstart', startDragging, { passive: false });
    window.addEventListener('touchend', stopDragging);
    window.addEventListener('touchmove', move, { passive: false });

    // Obsługa zoomowania (kółko myszy / touchpad)
    let currentScale = 1;
    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        currentScale = Math.min(Math.max(0.5, currentScale + delta), 4);
        wrapper.style.transform = `scale(${currentScale})`;
    }, { passive: false });

</script>

</body>
</html>
