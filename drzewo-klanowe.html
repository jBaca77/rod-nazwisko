<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drzewo Klanowe | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>

    <style>
        :root {
            --cream: #f8f4ee; --warm-white: #fdfaf6; --ink: #1e1a14;
            --gold: #9b7d4a; --gold-light: #c8a96e; --sepia: #7a6548;
            --sepia-pale: #e8ddd0;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Jost', sans-serif; background-color: var(--warm-white); color: var(--ink); overflow: hidden; }

        /* ── NAV ── */
        nav { background-color: var(--ink); position: sticky; top: 0; z-index: 1000; }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; }
        .nav-logo { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); text-decoration: none; font-size: 1.1rem; letter-spacing: 2px; }
        .nav-back-link { display: flex; align-items: center; gap: 8px; color: var(--gold-light); text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

        /* ── LAYOUT ── */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh; /* Pełna wysokość ekranu */
        }

        header { padding: 20px 20px 10px; text-align: center; flex-shrink: 0; }
        header h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; }
        .s-line { width: 40px; height: 1px; background: var(--gold-light); margin: 10px auto; opacity: 0.5; }

        /* ── VIEWER (Główny obszar drzewa) ── */
        #tree-viewer {
            flex-grow: 1; /* Zajmuje całą dostępną przestrzeń */
            background-color: var(--cream);
            border-top: 1px solid var(--sepia-pale);
            border-bottom: 1px solid var(--sepia-pale);
            position: relative;
        }

        /* ── FOOTER/ACTION ── */
        .footer-actions {
            padding: 15px;
            text-align: center;
            background: var(--warm-white);
            flex-shrink: 0;
        }
        .btn-download {
            display: inline-flex; align-items: center; padding: 10px 20px;
            background-color: var(--ink); color: var(--gold-light);
            text-decoration: none; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">ARCHIWUM L&K</a>
            <a href="genealogia.html" class="nav-back-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Wstecz
            </a>
        </div>
    </nav>

    <header>
        <h1>Drzewo Klanowe</h1>
        <div class="s-line"></div>
    </header>
    
    <div id="tree-viewer"></div>

    <div class="footer-actions">
        <a href="img/Dokumenty/drzewo_kol_20_08_2024.pdf" download class="btn-download">
            Pobierz pełny PDF
        </a>
    </div>
</div>

<script>
    // Inicjalizacja profesjonalnego silnika do przeglądania drzewa
    var viewer = OpenSeadragon({
        id: "tree-viewer",
        prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
        tileSources: {
            type: 'image',
            url: 'img/Dokumenty/drzewo_kol_20_08_2024_strona_1.jpeg'
        },
        visibilityRatio: 1.0,
        constrainDuringPan: true,
        defaultZoomLevel: 0,
        minZoomLevel: 0,
        maxZoomLevel: 10,
        autoHideControls: true,
        showNavigationControl: false, // Ukrywamy przyciski, bo gesty starczą
        gestureSettingsMouse: {
            scrollToZoom: true,
            clickToZoom: true,
            dblClickToZoom: true,
            dragToPan: true
        },
        gestureSettingsTouch: {
            pinchToZoom: true,
            dragToPan: true,
            dblClickToZoom: true
        }
    });
</script>

</body>
</html>
