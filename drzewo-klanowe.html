<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Drzewo Klanowe | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cream: #f8f4ee; --warm-white: #fdfaf6; --ink: #1e1a14;
            --gold: #9b7d4a; --gold-light: #c8a96e; --sepia: #7a6548;
            --sepia-pale: #e8ddd0; --line: rgba(122, 101, 72, 0.15);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Jost', sans-serif; 
            background-color: var(--warm-white); 
            color: var(--ink); 
            line-height: 1.7;
            /* Zapewnia płynne przewijanie na iOS */
            -webkit-overflow-scrolling: touch;
        }

        /* ── NAV (Styl Archiwum) ── */
        nav { background-color: var(--ink); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 20px rgba(0,0,0,0.2); }
        .nav-inner { 
            max-width: 1200px; margin: 0 auto; display: flex; align-items: center; 
            justify-content: space-between; padding: 16px 24px; 
        }
        .nav-logo { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); text-decoration: none; font-size: 1.2rem; letter-spacing: 2px; font-weight: 400; }
        .nav-back-link {
            display: flex; align-items: center; gap: 10px; color: var(--gold-light);
            text-decoration: none; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.3s;
            border-left: 1px solid rgba(200, 169, 110, 0.3); padding-left: 20px;
        }
        .nav-back-link:hover { color: var(--cream); }

        /* ── CONTENT ── */
        main { max-width: 1200px; margin: 0 auto; padding: 60px 24px; text-align: center; }
        .intro-section { margin-bottom: 50px; }
        .intro-section h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.4rem, 6vw, 3.8rem); font-weight: 300; margin-bottom: 15px; color: var(--ink); }
        .s-line { width: 60px; height: 1px; background: var(--gold-light); margin: 30px auto; opacity: 0.6; }

        /* ── INTERAKTYWNA RAMKA DRZEWA (KLUCZOWE) ── */
        .tree-frame {
            width: 100%;
            height: 80vh; /* Wysokość okna drzewa */
            background: var(--cream);
            border: 1px solid var(--sepia-pale);
            box-shadow: 0 15px 45px rgba(122, 101, 72, 0.1);
            position: relative;
            margin-bottom: 40px;
            overflow: hidden;
            border-radius: 2px;
        }

        /* Pseudo-element dla ozdobnej ramki wewnętrznej */
        .tree-frame::after {
            content: ""; position: absolute; inset: 12px;
            border: 1px solid var(--line); pointer-events: none;
        }

        /* Osadzony obiekt PDF */
        .tree-object {
            width: 100%;
            height: 100%;
            border: none;
            position: relative;
            z-index: 1;
            /* Włącza natywną obsługę gestów wewnątrz obiektu */
            touch-action: auto; 
        }

        /* ── ACTION AREA ── */
        .action-area { margin-top: 40px; margin-bottom: 60px; }
        .btn-download {
            display: inline-flex; align-items: center; padding: 16px 35px;
            background-color: var(--ink); color: var(--gold-light);
            text-decoration: none; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 2px; transition: all 0.4s; border: 1px solid var(--ink);
        }
        .btn-download:hover { background-color: var(--gold); color: var(--cream); border-color: var(--gold); transform: translateY(-2px); }
        .btn-download svg { margin-right: 12px; fill: currentColor; }

        footer { background: var(--ink); color: rgba(248,244,238,0.3); text-align: center; padding: 60px 24px; font-size: 0.75rem; letter-spacing: 1px; }

        /* Adaptacja dla mniejszych ekranów */
        @media (max-width: 768px) {
            .tree-frame { height: 65vh; }
            .nav-inner { padding: 12px 20px; }
            .nav-logo { font-size: 1rem; }
            .nav-back-link { padding-left: 15px; font-size: 0.65rem; }
            main { padding: 40px 15px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">ARCHIWUM L&K</a>
        <a href="genealogia.html" class="nav-back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Wstecz
        </a>
    </div>
</nav>

<main>
    <section class="intro-section">
        <h1>Drzewo Klanowe</h1>
        <p style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.2rem; color: var(--sepia); max-width: 600px; margin: 0 auto;">
            Odkryj korzenie rodu. Użyj gestów (rozsuwania palców lub touchpada), aby płynnie przybliżać i przesuwać widok.
        </p>
        <div class="s-line"></div>
    </section>
    
    <div class="tree-frame">
        <object 
            data="./img/Dokumenty/drzewo_kol_20_08_2024.pdf" 
            type="application/pdf" 
            class="tree-object">
            <p style="padding: 20px; text-align: center; color: var(--sepia);">
                Twoja przeglądarka nie obsługuje wbudowanego widoku PDF.<br>
                Skorzystaj z przycisku poniżej, aby pobrać plik.
            </p>
        </object>
    </div>

    <div class="action-area">
        <a href="./img/Dokumenty/drzewo_kol_20_08_2024.pdf" download class="btn-download">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Pobierz pełne drzewo (PDF)
        </a>
    </div>
</main>

<footer>
    <p>KLAN ŁADOMIRSKICH I KRAIŃSKICH © 1975 – 2026</p>
</footer>

</body>
</html>
