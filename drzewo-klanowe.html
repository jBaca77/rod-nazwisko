<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drzewo Klanowe | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f8f4ee; --parchment: #ede8df; --warm-white: #fdfaf6;
            --ink: #1e1a14; --ink-light: #3d3628; --sepia: #7a6548;
            --sepia-light: #b09a7e; --sepia-pale: #e8ddd0; --gold: #9b7d4a;
            --gold-light: #c8a96e; --line: rgba(122, 101, 72, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Jost', sans-serif; font-weight: 300; background-color: var(--warm-white); color: var(--ink); line-height: 1.7; }

        /* ── NAV (Styl Zjazd1) ── */
        nav { background-color: var(--ink); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
        .nav-inner { 
            max-width: 1200px; margin: 0 auto; display: flex; align-items: center; 
            padding: 16px 24px; gap: 20px;
        }
        
        .nav-back-link {
            display: flex; align-items: center; gap: 8px; color: var(--gold-light);
            text-decoration: none; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.3s;
        }
        .nav-back-link:hover { color: var(--cream); }

        .nav-logo { 
            font-family: 'Cormorant Garamond', serif; color: var(--gold-light); 
            text-decoration: none; font-size: 1.2rem; letter-spacing: 2px; font-weight: 400;
            border-left: 1px solid rgba(200, 169, 110, 0.3); padding-left: 20px;
        }

        /* ── MAIN CONTENT ── */
        main { max-width: 1200px; margin: 0 auto; padding: 60px 24px; }
        
        .intro-section { text-align: center; margin-bottom: 50px; }
        .s-label { font-size: .7rem; letter-spacing: .4em; text-transform: uppercase; color: var(--sepia-light); display: block; margin-bottom: 15px; }
        .intro-section h1 { 
            font-family: 'Cormorant Garamond', serif; font-size: clamp(2.4rem, 6vw, 3.8rem); 
            font-weight: 300; margin-bottom: 25px; color: var(--ink);
        }
        .intro-description { 
            max-width: 700px; margin: 0 auto; font-family: 'Cormorant Garamond', serif; 
            font-style: italic; font-size: 1.3rem; color: var(--sepia); line-height: 1.6;
        }
        .s-line { width: 60px; height: 1px; background: var(--gold-light); margin: 30px auto; opacity: 0.6; }

        /* ── RAMKA DRZEWA ── */
        .tree-container {
            background: var(--cream);
            border: 1px solid var(--sepia-pale);
            padding: 12px;
            box-shadow: 0 15px 45px rgba(122, 101, 72, 0.08);
            position: relative;
            margin-bottom: 40px;
        }
        .tree-container::after {
            content: ""; position: absolute; inset: 8px;
            border: 1px solid var(--line); pointer-events: none;
        }

        .viewer-box {
            position: relative;
            height: 80vh;
            width: 100%;
            background: white;
            z-index: 1;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* ── PRZYCISK POBIERANIA ── */
        .action-area { text-align: center; padding-bottom: 40px; }
        .btn-download {
            display: inline-flex; align-items: center; padding: 16px 32px;
            background-color: var(--ink); color: var(--gold-light);
            text-decoration: none; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 2px; transition: all 0.4s; border: 1px solid var(--ink);
        }
        .btn-download:hover {
            background-color: var(--gold); color: var(--cream); border-color: var(--gold);
            transform: translateY(-2px);
        }
        .btn-download svg { margin-right: 12px; }

        footer { background: var(--ink); color: rgba(248,244,238,0.3); text-align: center; padding: 60px 24px; font-size: 0.75rem; letter-spacing: 1px; }

        @media (max-width: 768px) {
            .nav-inner { padding: 12px 20px; }
            .nav-logo { font-size: 1rem; padding-left: 15px; }
            .viewer-box { height: 65vh; }
            .intro-section h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="genealogia.html" class="nav-back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Wstecz
        </a>
        <a href="index.html" class="nav-logo">ARCHIWUM L&K</a>
    </div>
</nav>

<main>
    <section class="intro-section">
        <span class="s-label">Księgi i Rodowody</span>
        <h1>Drzewo Klanowe</h1>
        <p class="intro-description">
            „Rodzina to nie tylko krew. To pamięć o tych, którzy byli przed nami, <br>
            i fundament dla tych, którzy przyjdą po nas.”
        </p>
        <div class="s-line"></div>
        <p style="font-size: 0.85rem; color: var(--sepia-light); text-transform: uppercase; letter-spacing: 1px;">
            Aktualizacja: XXIII Zjazd Rodzinny – Borowice 2024
        </p>
    </section>
    
    <div class="tree-container">
        <div class="viewer-box">
            <iframe 
                src="https://drive.google.com/file/d/1dcD-e-MPsT3NgZnzt3hoMpuGtJsj2JLu/preview" 
                allow="autoplay">
            </iframe>
        </div>
    </div>

    <div class="action-area">
        <a href="https://drive.google.com/file/d/1dcD-e-MPsT3NgZnzt3hoMpuGtJsj2JLu/view?usp=sharing" target="_blank" class="btn-download">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Pobierz pełne drzewo (PDF)
        </a>
    </div>
</main>

<footer>
    <p>KLAN ŁADOMIRSKICH I KRAIŃSKICH © 1975 – 2026</p>
</footer>

</body>
</html>
