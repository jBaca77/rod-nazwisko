<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drzewo Klanowe | Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f8f4ee; --parchment: #ede8df; --warm-white: #fdfaf6;
            --ink: #1e1a14; --ink-light: #3d3628; --sepia: #7a6548;
            --sepia-light: #b09a7e; --sepia-pale: #e8ddd0; --gold: #9b7d4a;
            --gold-light: #c8a96e; --green-dark: #2c3e2d; --line: rgba(122, 101, 72, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Jost', sans-serif; font-weight: 300; background-color: var(--warm-white); color: var(--ink); line-height: 1.7; }

        /* ── HEADER ── */
        header { background-color: var(--green-dark); color: var(--cream); text-align: center; padding: 80px 24px 60px; position: relative; overflow: hidden; }
        header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,.025) 40px, rgba(255,255,255,.025) 41px), repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,.025) 40px, rgba(255,255,255,.025) 41px); pointer-events: none; }
        
        .btn-back { 
            position: absolute; top: 30px; left: 30px; color: var(--gold-light); 
            text-decoration: none; font-size: 0.75rem; text-transform: uppercase; 
            letter-spacing: 2px; display: flex; align-items: center; gap: 8px; transition: 0.3s; z-index: 10;
        }
        .btn-back:hover { color: var(--cream); transform: translateX(-5px); }

        .header-ornament { font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: .35em; text-transform: uppercase; color: var(--gold-light); margin-bottom: 15px; display: block; }
        header h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(2.2rem, 5vw, 3.5rem); line-height: 1.1; }

        /* ── NAV ── */
        nav { background-color: var(--ink); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 20px rgba(0,0,0,.3); }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; }
        .nav-logo { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); text-decoration: none; font-size: 1.1rem; letter-spacing: 2px; }

        /* ── MAIN ── */
        main { max-width: 1300px; margin: 0 auto; padding: 50px 24px; text-align: center; }
        .s-label { font-size: .65rem; letter-spacing: .3em; text-transform: uppercase; color: var(--sepia-light); margin-bottom: 10px; display: block; }
        
        /* ── RAMKA DRZEWA ── */
        .tree-frame {
            margin: 40px auto;
            padding: 15px;
            background: var(--cream);
            border: 1px solid var(--sepia-pale);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
            max-width: 1100px;
        }
        .tree-frame::before {
            content: ""; position: absolute; inset: 8px;
            border: 1px solid var(--line); pointer-events: none;
        }

        .viewer-wrapper {
            position: relative;
            height: 75vh;
            width: 100%;
            background: white;
            overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* ── PRZYCISK POBIERANIA ── */
        .download-container { margin-top: 40px; }
        .btn-download {
            display: inline-flex;
            align-items: center;
            padding: 15px 35px;
            background-color: var(--gold);
            color: var(--cream);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            border: 1px solid var(--gold);
        }
        .btn-download:hover {
            background-color: transparent;
            color: var(--gold);
            transform: translateY(-3px);
        }
        .btn-download svg { margin-right: 10px; fill: currentColor; }

        footer { background: var(--ink); color: rgba(248,244,238,0.4); text-align: center; padding: 60px 24px; font-size: 0.8rem; margin-top: 50px; }

        @media (max-width: 768px) {
            .btn-back { position: relative; top: 0; left: 0; justify-content: center; margin-bottom: 20px; }
            .viewer-wrapper { height: 60vh; }
        }
    </style>
</head>
<body>

<header>
    <a href="genealogia.html" class="btn-back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Wstecz do genealogii
    </a>
    <span class="header-ornament">Archiwum Cyfrowe</span>
    <h1>Drzewo Klanowe</h1>
</header>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">ARCHIWUM L&K</a>
    </div>
</nav>

<main>
    <span class="s-label">Edycja XXIII – Borowice 2024</span>
    
    <div class="tree-frame">
        <div class="viewer-wrapper">
            <iframe 
                src="https://drive.google.com/file/d/1dcD-e-MPsT3NgZnzt3hoMpuGtJsj2JLu/preview" 
                allow="autoplay">
            </iframe>
        </div>
    </div>

    <div class="download-container">
        <p style="font-size: 0.9rem; color: var(--sepia); margin-bottom: 20px; font-style: italic;">
            Aby zapisać kopię drzewa na swoim urządzeniu, skorzystaj z poniższego przycisku:
        </p>
        <a href="https://drive.google.com/file/d/1dcD-e-MPsT3NgZnzt3hoMpuGtJsj2JLu/view?usp=sharing" target="_blank" class="btn-download">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Pobierz plik PDF
        </a>
    </div>
</main>

<footer>
    <p>KLAN ŁADOMIRSKICH I KRAIŃSKICH © 1975 – 2026</p>
</footer>

</body>
</html>
