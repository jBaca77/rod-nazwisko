<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zjazd: Archiwum L&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f8f4ee; --parchment: #ede8df; --warm-white: #fdfaf6;
            --ink: #1e1a14; --sepia: #7a6548; --gold: #9b7d4a; --gold-light: #c8a96e;
            --line: rgba(122, 101, 72, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Jost', sans-serif; background-color: var(--warm-white); color: var(--ink); line-height: 1.8; }

        /* NAWIGACJA GÓRNA */
        nav { background-color: var(--ink); padding: 16px 24px; position: sticky; top: 0; z-index: 1000; }
        .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); text-decoration: none; font-size: 1.2rem; letter-spacing: 2px; }
        .back-link { color: var(--cream); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        /* NAGŁÓWEK */
        .article-header { max-width: 900px; margin: 60px auto 40px; padding: 0 24px; text-align: center; }
        .meta-top { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--sepia); margin-bottom: 15px; display: block; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 400; line-height: 1.2; margin-bottom: 10px; }

        .info-panel { 
            max-width: 850px; margin: 0 auto 50px; padding: 30px; 
            background: var(--parchment); border-radius: 4px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;
        }
        .info-item { font-size: 0.9rem; }
        .info-item strong { display: block; text-transform: uppercase; letter-spacing: 1px; color: var(--sepia); font-size: 0.75rem; }

        /* HERO IMAGE */
        .hero-container { max-width: 1100px; margin: 0 auto 60px; padding: 0 24px; }
        .main-img { width: 100%; height: auto; border: 1px solid var(--line); padding: 10px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* GALERIA */
        .gallery-wrapper { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }
        .simple-gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            grid-auto-rows: 180px; gap: 12px; 
        }
        .gallery-item { overflow: hidden; cursor: pointer; border-radius: 2px; background: var(--ink); border: 1px solid var(--line); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; opacity: 0.8; }
        .gallery-item:hover img { opacity: 1; transform: scale(1.08); }

        /* PRZYCISKI NA DOLE */
        .zjazdy-pagination { 
            max-width: 800px; margin: 0 auto 80px; padding: 40px 24px; 
            border-top: 1px solid var(--line); display: flex; 
            justify-content: center; gap: 20px; flex-wrap: wrap;
        }
        .pagination-btn {
            text-decoration: none; color: var(--sepia); font-size: 0.75rem; 
            text-transform: uppercase; letter-spacing: 2px; padding: 12px 24px;
            border: 1px solid var(--line); transition: 0.3s;
        }
        .pagination-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--parchment); }

        /* LIGHTBOX */
        #lightbox {
            display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 13, 10, 0.98); justify-content: center; align-items: center; user-select: none;
        }
        .lb-container { display: flex; flex-direction: column; align-items: center; width: 95%; }
        #lb-img { max-width: 100%; max-height: 75vh; border: 1px solid var(--gold); background: white; padding: 5px; }
        .lb-controls { margin-top: 20px; display: flex; align-items: center; gap: 40px; color: var(--gold-light); }
        .lb-arrow { background: none; border: none; color: var(--gold-light); font-size: 3rem; cursor: pointer; }

        footer { background: var(--ink); color: rgba(248,244,238,0.4); text-align: center; padding: 60px 24px; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">ARCHIWUM L&K</a>
        <a href="zjazdy.html" class="back-link">← Powrót do listy</a>
    </div>
</nav>

<article>
    <header class="article-header">
        <span class="meta-top">Archiwum Rodzinne</span>
        <h1>II Zjazd: Szalejów Dolny</h1>
    </header>

    <div class="info-panel">
        <div class="info-item"><strong>Miejsce</strong> Szalejów Dolny</div>
        <div class="info-item"><strong>Data</strong> 1980 r.</div>
    </div>

    <div class="hero-container">
        <img src="./img/zjazdy/zjazdii/foto_zjazdii_00.jpg" alt="Zjazd" class="main-img">
    </div>

    <div class="gallery-wrapper">
        <h2 style="text-align:center; font-family:'Cormorant Garamond'; margin-bottom:30px;">Fotokronika</h2>
        <div class="simple-gallery" id="gallery-container"></div>
    </div>

    <div id="dynamic-nav" class="zjazdy-pagination"></div>
</article>

<div id="lightbox" onclick="this.style.display='none'; document.body.style.overflow='auto'">
    <div class="lb-container" onclick="event.stopPropagation()">
        <img id="lb-img" src="">
        <div class="lb-controls">
            <button class="lb-arrow" onclick="changePhoto(-1)">❮</button>
            <div id="lb-counter"></div>
            <button class="lb-arrow" onclick="changePhoto(1)">❯</button>
        </div>
    </div>
</div>

<footer><p>KLAN ŁADOMIRSKICH I KRAIŃSKICH</p></footer>

<script>
    // --- KLUCZOWA KONFIGURACJA ---
    const TEN_ZJAZD_NUMER = 2;        // Zmień na 1, 2, 3, 24 itd.
    const OSTATNI_ZJAZD_NUMER = 24;   // Zmień, gdy dodasz np. 25 zjazd
    const zjazd_folder = 'zjazdii';   // Nazwa folderu ze zdjęciami
    const liczba_zdjec = 87; 

    // 1. Generowanie galerii
    const container = document.getElementById('gallery-container');
    for (let i = 1; i <= liczba_zdjec; i++) {
        const nr = i.toString().padStart(2, '0');
        const path = `./img/zjazdy/${zjazd_folder}/foto_${zjazd_folder}_${nr}.jpg`;
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.innerHTML = `<img src="${path}" loading="lazy">`;
        div.onclick = () => openLightbox(i);
        container.appendChild(div);
    }

    // 2. Lightbox
    let currentIdx = 1;
    function openLightbox(i) {
        currentIdx = i;
        updateLB();
        document.getElementById('lightbox').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function changePhoto(dir) {
        currentIdx += dir;
        if (currentIdx > liczba_zdjec) currentIdx = 1;
        if (currentIdx < 1) currentIdx = liczba_zdjec;
        updateLB();
    }
    function updateLB() {
        const nr = currentIdx.toString().padStart(2, '0');
        document.getElementById('lb-img').src = `./img/zjazdy/${zjazd_folder}/foto_${zjazd_folder}_${nr}.jpg`;
        document.getElementById('lb-counter').innerText = `${currentIdx} / ${liczba_zdjec}`;
    }

    // 3. NAWIGACJA (Ręczne sterowanie)
    function generujNawigacje() {
        const nav = document.getElementById('dynamic-nav');
        let html = '';

        // Wstecz
        if (TEN_ZJAZD_NUMER > 1) {
            html += `<a href="zjazd${TEN_ZJAZD_NUMER - 1}.html" class="pagination-btn">← Poprzedni</a>`;
        }

        // Lista
        html += `<a href="zjazdy.html" class="pagination-btn">Lista Zjazdów</a>`;

        // Dalej
        if (TEN_ZJAZD_NUMER < OSTATNI_ZJAZD_NUMER) {
            html += `<a href="zjazd${TEN_ZJAZD_NUMER + 1}.html" class="pagination-btn">Następny →</a>`;
        }

        nav.innerHTML = html;
    }
    generujNawigacje();
</script>
</body>
</html>
